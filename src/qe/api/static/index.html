                    <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", fontSize: 11, fontFamily: FONT_MONO, color: massIntelDeepResearch ? palette.yellow : palette.textDim }}>
                      <input type="checkbox" checked={massIntelDeepResearch} onChange={() => setMassIntelDeepResearch(v => !v)} style={{ accentColor: palette.yellow, cursor: "pointer" }} />
                      Extensive research
                    </label>
                  </div>
                  <button onClick={handleMassIntelQuery} disabled={!massIntelInput.trim() || massIntelLoading} style={{ padding: "10px 24px", borderRadius: 6, border: "none", cursor: massIntelInput.trim() && !massIntelLoading ? "pointer" : "not-allowed", fontFamily: FONT_MONO, fontSize: 12, fontWeight: 600, background: massIntelLoading ? palette.border : palette.accent, color: massIntelLoading ? palette.textDim : palette.bg, opacity: massIntelInput.trim() ? 1 : 0.5 }}>{massIntelLoading ? "Querying models..." : "Submit Query"}</button>
                  {massIntelLoading && (
                    <div style={{ marginTop: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                        <span style={{ fontSize: 12, color: palette.accent, animation: "pulse 1.5s infinite" }}>⟳</span>
                        <span style={{ fontSize: 12, fontFamily: FONT_MONO, color: palette.textDim }}>Querying {massIntelSelected.size > 0 ? massIntelSelected.size : massIntelFilteredModels.length} models... this may take {massIntelExtendedTimeout ? "up to 90s" : "10-30s"}{massIntelDeepResearch ? " (deep research)" : ""}</span>
                        <span style={{ marginLeft: "auto", fontSize: 11, fontFamily: FONT_MONO, color: palette.accent }}>{Math.round(massIntelProgress)}%</span>
                      </div>
                      <div style={{ height: 6, background: palette.border, borderRadius: 3, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${massIntelProgress}%`, background: `linear-gradient(90deg, ${palette.accent}, ${palette.blue})`, borderRadius: 3, transition: "width 0.3s ease" }} />
                      </div>
                    </div>
                  )}
                  {massIntelResult && (
                    <div style={{ marginTop: 16 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                        <Badge color={palette.green}>{massIntelResult.successful || 0} succeeded</Badge>
                        <Badge color={palette.red}>{massIntelResult.failed || 0} failed</Badge>
                        <Badge color={palette.textDim}>{(massIntelResult.total_time_ms || 0).toFixed(0)}ms total</Badge>
                        <button onClick={handleMassIntelConsensus} disabled={massIntelConsensusLoading || (massIntelResult.successful || 0) < 2} style={{ marginLeft: "auto", padding: "8px 20px", borderRadius: 6, border: "none", cursor: (massIntelResult.successful || 0) >= 2 && !massIntelConsensusLoading ? "pointer" : "not-allowed", fontFamily: FONT_MONO, fontSize: 12, fontWeight: 700, background: massIntelConsensusLoading ? palette.border : `linear-gradient(135deg, ${palette.accent}, ${palette.yellow})`, color: massIntelConsensusLoading ? palette.textDim : "#fff", opacity: (massIntelResult.successful || 0) >= 2 ? 1 : 0.4 }}>{massIntelConsensusLoading ? "Generating..." : "Generate Consensus"}</button>
                      </div>
                      {massIntelConsensusLoading && <div style={{ marginBottom: 12, padding: "12px 16px", background: palette.surface, borderRadius: 6, border: `1px solid ${palette.accent}30`, display: "flex", alignItems: "center", gap: 10 }}><span style={{ fontSize: 12, color: palette.accent, animation: "pulse 1.5s infinite" }}>⟳</span><span style={{ fontSize: 12, fontFamily: FONT_MONO, color: palette.textDim }}>Synthesizing {massIntelResult.successful} model responses into consensus...</span></div>}
                      {massIntelConsensus && (
                        <div style={{ marginBottom: 16, padding: "18px 20px", background: `linear-gradient(135deg, ${palette.accentDim}, ${palette.yellowDim || "rgba(251,191,36,0.08)"})`, borderRadius: 8, border: `1px solid ${palette.accent}40` }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                            <span style={{ fontSize: 14 }}>✦</span>
                            <span style={{ fontSize: 13, fontWeight: 700, color: palette.accent }}>Consensus</span>
                            <span style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, marginLeft: "auto" }}>from {massIntelConsensus.source_count} models · {massIntelConsensus.model_used}</span>
                          </div>
                          <div style={{ fontSize: 13, color: palette.textBright, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{massIntelConsensus.consensus}</div>
                        </div>
                      )}
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {(massIntelResult.responses || []).map((r, i) => (
                          <div key={i} style={{ padding: "12px 16px", background: palette.bg, borderRadius: 6, border: `1px solid ${r.success ? palette.green + "30" : palette.red + "30"}` }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: r.response ? 8 : 0 }}>
                              <StatusDot alive={r.success} />
                              <span style={{ fontSize: 11, fontWeight: 600, color: palette.textBright }}>{r.model_name || r.model_id}</span>
                              <span style={{ fontSize: 9, fontFamily: FONT_MONO, color: palette.textDim, marginLeft: "auto" }}>{(r.latency_ms || 0).toFixed(0)}ms</span>
                            </div>
                            {r.response && <div style={{ fontSize: 12, color: palette.text, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{r.response}</div>}
                            {r.error && <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.red, marginTop: 4 }}>{r.error}</div>}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </Card>
                {massIntelModels.length > 0 && (
                  <Card title={`Available Models — ${massIntelFilteredModels.length}${massIntelFreeOnly ? " free" : ""} models${massIntelSelected.size > 0 ? ` (${massIntelSelected.size} selected)` : ""}`}>
                    <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
                      <button onClick={() => setMassIntelSelected(new Set())} style={{ padding: "4px 12px", borderRadius: 4, border: `1px solid ${palette.border}`, background: massIntelSelected.size === 0 ? palette.accentDim : "transparent", color: massIntelSelected.size === 0 ? palette.accent : palette.textDim, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer" }}>All Models</button>
                      {[...new Set(massIntelFilteredModels.map(m => m.provider))].map(prov => {
                        const provModels = massIntelFilteredModels.filter(m => m.provider === prov).map(m => m.model_id);
                        const allProvSelected = provModels.every(id => massIntelSelected.has(id));
                        return <button key={prov} onClick={() => {
                          setMassIntelSelected(prev => {
                            const next = new Set(prev);
                            if (allProvSelected) { provModels.forEach(id => next.delete(id)); } else { provModels.forEach(id => next.add(id)); }
                            return next;
                          });
                        }} style={{ padding: "4px 12px", borderRadius: 4, border: `1px solid ${palette.border}`, background: allProvSelected ? palette.accentDim : "transparent", color: allProvSelected ? palette.accent : palette.textDim, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer", textTransform: "capitalize" }}>{prov} ({provModels.length})</button>;
                      })}
                      {massIntelSelected.size > 0 && <button onClick={() => setMassIntelSelected(new Set())} style={{ padding: "4px 12px", borderRadius: 4, border: `1px solid ${palette.red}40`, background: "transparent", color: palette.red, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer" }}>Clear Selection</button>}
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 8 }}>
                      {massIntelFilteredModels.map((m, i) => {
                        const sel = massIntelSelected.size === 0 || massIntelSelected.has(m.model_id);
                        return (
                          <div key={m.model_id || i} onClick={() => {
                            setMassIntelSelected(prev => {
                              const next = new Set(prev);
                              if (prev.size === 0) { massIntelFilteredModels.forEach(mm => next.add(mm.model_id)); next.delete(m.model_id); }
                              else if (next.has(m.model_id)) next.delete(m.model_id);
                              else next.add(m.model_id);
                              return next;
                            });
                          }} style={{ padding: "10px 14px", background: sel ? palette.bg : palette.surface, borderRadius: 6, border: `1px solid ${sel ? palette.accent + "40" : palette.border}`, cursor: "pointer", opacity: sel ? 1 : 0.4, transition: "all 0.15s" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <div style={{ width: 14, height: 14, borderRadius: 3, border: `1.5px solid ${sel ? palette.accent : palette.border}`, background: sel ? palette.accent : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                                {sel && <span style={{ color: "#fff", fontSize: 9, lineHeight: 1 }}>✓</span>}
                              </div>
                              <div style={{ minWidth: 0 }}>
                                <div style={{ fontSize: 11, fontWeight: 500, color: palette.textBright, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.model_name || m.model_id}</div>
                                <div style={{ fontSize: 9, fontFamily: FONT_MONO, color: palette.textDim }}>{m.provider}{m.context_length ? ` · ${(m.context_length/1024).toFixed(0)}k ctx` : ""}</div>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </Card>
                )}
              </div>
            )}

            {/* ═══ PEERS ═══ */}
            {activeTab === "peers" && (

                  <button onClick={handleAddPeer} disabled={!peerAddUrl.trim()} style={{ padding: "10px 20px", borderRadius: 6, border: "none", cursor: peerAddUrl.trim() ? "pointer" : "not-allowed", fontFamily: FONT_MONO, fontSize: 12, fontWeight: 600, background: palette.accent, color: palette.bg, opacity: peerAddUrl.trim() ? 1 : 0.5 }}>Add Peer</button>
                </div>
                {peers.length === 0 ? <Card><EmptyState icon={Icons.peers} message="No peers configured." /></Card> : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>

                        <StatusDot alive={p.healthy !== false} />
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 500, color: palette.textBright }}>{p.name || p.url || `Peer ${i + 1}`}</div>
                          <div style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim }}>{p.url || ""}</div>
                        </div>
                        <StatusPill status={p.healthy !== false ? "healthy" : "down"} />
                        <select value={p.permissions || "restricted"} onChange={e => handlePeerPermissions(p.peer_id || p.id, e.target.value)} style={{ padding: "4px 8px", borderRadius: 4, background: palette.surface, border: `1px solid ${palette.border}`, color: palette.text, fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>
                          <option value="restricted">restricted</option>
                          <option value="standard">standard</option>
                          <option value="autonomous">autonomous</option>
                        </select>
                        <button onClick={() => handleDeletePeer(p.peer_id || p.id)} style={{ padding: "4px 8px", borderRadius: 4, border: "none", cursor: "pointer", background: "transparent" }}>
                          <Icon d={Icons.trash} size={14} color={palette.red} />
                        </button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* ═══ AUDIT ═══ */}
            {activeTab === "audit" && (
              <div>
                <SectionHeader title="Audit Log" subtitle={`${Array.isArray(auditLog) ? auditLog.length : 0} entries`} actions={
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={fetchAuditLog} style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.surface, color: palette.textDim, fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>Refresh</button>
                    <button onClick={() => {
                      const blob = new Blob([JSON.stringify(auditLog, null, 2)], { type: "application/json" });
                      const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "qe-audit-log.json"; a.click(); URL.revokeObjectURL(url);
                    }} style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.surface, color: palette.textDim, fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>
                      <Icon d={Icons.download} size={12} color={palette.textDim} style={{ marginRight: 4 }} /> Export
                    </button>
                  </div>
                } />
                <div style={{ background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, overflow: "hidden" }}>
                  {Array.isArray(auditLog) && auditLog.length > 0 ? (
                    <DataTable
                      columns={[
                        { key: "timestamp", label: "Time", width: "140px", render: r => <span style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim }}>{r.timestamp ? new Date(r.timestamp).toLocaleString() : ""}</span> },
                        { key: "action", label: "Action", width: "140px", render: r => <Badge color={palette.accent}>{r.action || r.event_type || "unknown"}</Badge> },
                        { key: "actor", label: "Actor", width: "120px", render: r => <span style={{ fontSize: 12, fontFamily: FONT_MONO, color: palette.text }}>{r.actor || r.user || "system"}</span> },
                        { key: "details", label: "Details", render: r => <span style={{ fontSize: 12, color: palette.textDim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.details || r.description || JSON.stringify(r.data || {}).slice(0, 100)}</span> },
                      ]}
                      rows={auditLog}
                      maxHeight={600}
                      emptyMessage="No audit entries."
                    />
                  ) : <EmptyState icon={Icons.audit} message="No audit log entries." />}
                </div>
              </div>
            )}

            {/* ═══ SETTINGS ═══ */}
            {activeTab === "settings" && (
              <div>
                <SectionHeader title="Settings" subtitle="Configure engine behavior, display preferences, and integrations" actions={
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 12px", background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 6 }}>
                      <Icon d={Icons.search} size={12} color={palette.textDim} />
                      <input value={settingsSearch} onChange={e => setSettingsSearch(e.target.value)} placeholder="Search settings..." style={{ background: "none", border: "none", outline: "none", color: palette.text, fontFamily: FONT_MONO, fontSize: 10, width: 120 }} />
                    </div>
                    <button onClick={() => { if (!settingsRawMode) setSettingsRawJson(JSON.stringify(settings, null, 2)); setSettingsRawMode(v => !v); }} style={{ padding: "5px 12px", borderRadius: 6, border: `1px solid ${palette.border}`, background: settingsRawMode ? palette.accentDim : palette.surface, color: settingsRawMode ? palette.accent : palette.textDim, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer" }}>{settingsRawMode ? "Form View" : "Raw JSON"}</button>
                  </div>
                } />
                {settingsError && <AlertBanner type="error" message={settingsError} onDismiss={() => setSettingsError(null)} />}
                {settingsSuccess && <AlertBanner type="success" message="Settings saved successfully!" />}

                {/* Raw JSON Editor */}
                {settingsRawMode ? (
                  <div>
                    <textarea value={settingsRawJson} onChange={e => { setSettingsRawJson(e.target.value); setSettingsDirty(true); }} style={{ width: "100%", minHeight: 500, padding: 16, borderRadius: 8, border: `1px solid ${palette.border}`, background: palette.surface, color: palette.text, fontFamily: FONT_MONO, fontSize: 12, lineHeight: 1.5, resize: "vertical", outline: "none", boxSizing: "border-box" }} />
                    <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                      <button onClick={() => { try { setSettings(JSON.parse(settingsRawJson)); setSettingsDirty(true); addToast("JSON applied to form", palette.green); } catch { addToast("Invalid JSON", palette.red); } }} style={{ padding: "8px 16px", borderRadius: 6, border: "none", background: palette.accent, color: palette.bg, fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>Apply JSON</button>
                      <button onClick={() => { navigator.clipboard.writeText(settingsRawJson); addToast("Copied", palette.green); }} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.surface, color: palette.textDim, fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>Copy</button>
                    </div>
                  </div>
                ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

                  <Card title="Budget & Spending">
                    <div style={{ display: "flex", gap: 20 }}>
                      <div style={{ flex: 1 }}>
                        <label style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.06em", display: "block", marginBottom: 6 }}>Budget Limit (USD)</label>
                        <input type="number" min="0.5" step="0.5" value={settings.budget?.limit_usd ?? 5} onChange={e => updateSetting("budget", "limit_usd", parseFloat(e.target.value) || 5)} style={{ width: 120, padding: "8px 10px", borderRadius: 5, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 13, outline: "none" }} />
                      </div>
                      <div style={{ flex: 1 }}>
                        <label style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.06em", display: "block", marginBottom: 6 }}>Alert Threshold (%)</label>
                        <input type="number" min="5" max="95" step="5" value={settings.budget?.alert_threshold_pct ?? 20} onChange={e => updateSetting("budget", "alert_threshold_pct", parseInt(e.target.value) || 20)} style={{ width: 120, padding: "8px 10px", borderRadius: 5, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 13, outline: "none" }} />
                      </div>
                    </div>
                  </Card>

                  {/* LLM Providers & Model Tiers */}
                  <Card title="LLM Providers">
                    {reconfigError && <AlertBanner type="error" message={reconfigError} onDismiss={() => setReconfigError(null)} />}
                    {reconfigSuccess && <AlertBanner type="success" message="Provider configuration saved!" />}
                    <div style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, marginBottom: 14 }}>Set API keys for each provider. Active providers are highlighted.</div>

                    {/* Active providers */}
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 10, marginBottom: 20 }}>
                      {reconfigProviders.map(p => (
                        <div key={p.name} style={{ padding: "10px 14px", borderRadius: 8, border: `1px solid ${p.configured ? palette.green + "40" : palette.border}`, background: p.configured ? palette.greenDim : palette.bg }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                            <StatusDot alive={p.configured} />
                            <span style={{ fontSize: 12, fontWeight: 600, color: palette.textBright }}>{p.name}</span>
                            {p.env_var && <span style={{ fontSize: 9, fontFamily: FONT_MONO, color: palette.textDim, marginLeft: "auto" }}>{p.env_var}</span>}
                          </div>
                          {p.masked_key && !reconfigKeys[p.name] && <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, marginBottom: 6 }}>Current: {p.masked_key}</div>}
                          {p.env_var && <input type="password" placeholder={p.configured ? "Enter new key to update..." : "Paste API key..."} value={reconfigKeys[p.name] || ""} onChange={e => { setReconfigKeys(prev => ({ ...prev, [p.name]: e.target.value })); setReconfigDirty(true); }} style={{ width: "100%", padding: "6px 10px", borderRadius: 5, border: `1px solid ${palette.border}`, background: palette.surface, color: palette.text, fontFamily: FONT_MONO, fontSize: 11, outline: "none", boxSizing: "border-box" }} />}
                        </div>
                      ))}
                    </div>

                    {/* Model Tier Assignments */}
                    <div style={{ borderTop: `1px solid ${palette.border}`, paddingTop: 16, marginBottom: 16 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: palette.textBright, marginBottom: 10 }}>Model Tier Assignments</div>
                      <div style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, marginBottom: 12 }}>Assign models to tiers: fast (cheap/quick), balanced (daily driver), powerful (best quality)</div>
                      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 10 }}>
                        {["fast", "balanced", "powerful"].map(tier => (
                          <div key={tier} style={{ padding: "10px 14px", borderRadius: 8, border: `1px solid ${palette.border}`, background: palette.bg }}>
                            <label style={{ fontSize: 10, fontFamily: FONT_MONO, color: tier === "fast" ? palette.green : tier === "balanced" ? palette.blue : palette.accent, textTransform: "uppercase", letterSpacing: "0.08em", display: "block", marginBottom: 6, fontWeight: 700 }}>{tier}</label>
                            <input type="text" placeholder="e.g. openai/gpt-4o-mini" value={reconfigTiers[tier] || ""} onChange={e => { setReconfigTiers(prev => ({ ...prev, [tier]: e.target.value })); setReconfigDirty(true); }} style={{ width: "100%", padding: "6px 10px", borderRadius: 5, border: `1px solid ${palette.border}`, background: palette.surface, color: palette.text, fontFamily: FONT_MONO, fontSize: 11, outline: "none", boxSizing: "border-box" }} />
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Save Providers Button */}
                    <button onClick={handleReconfigSave} disabled={!reconfigDirty || reconfigSaving} style={{
                      width: "100%", padding: "10px 16px", borderRadius: 6, border: "none",
                      cursor: reconfigDirty && !reconfigSaving ? "pointer" : "not-allowed",
                      background: reconfigDirty && !reconfigSaving ? palette.green : palette.border,
                      color: reconfigDirty && !reconfigSaving ? "#fff" : palette.textDim,
                      fontFamily: FONT_MONO, fontSize: 12, fontWeight: 700, transition: "all 0.2s",
                    }}>{reconfigSaving ? "Saving..." : reconfigDirty ? "Save Provider Configuration" : "No Provider Changes"}</button>
                  </Card>

                  {/* Pipeline & Runtime */}
                  <Card title="Pipeline & Runtime">
                    <div style={{ display: "flex", gap: 20 }}>
                      <div style={{ flex: 1 }}>
                        <label style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.06em", display: "block", marginBottom: 6 }}>HIL Timeout (seconds)</label>
                        <input type="number" min="60" step="60" value={settings.runtime?.hil_timeout_seconds ?? 300} onChange={e => updateSetting("runtime", "hil_timeout_seconds", parseInt(e.target.value) || 60)} style={{ width: 120, padding: "8px 10px", borderRadius: 5, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 13, outline: "none" }} />
                      </div>
                      <div style={{ flex: 1 }}>
                        <label style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.06em", display: "block", marginBottom: 6 }}>Log Level</label>
                        <select value={settings.runtime?.log_level ?? "INFO"} onChange={e => updateSetting("runtime", "log_level", e.target.value)} style={{ width: "100%", padding: "8px 10px", borderRadius: 5, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 13, outline: "none" }}>
                          {["DEBUG", "INFO", "WARNING", "ERROR"].map(l => <option key={l} value={l}>{l}</option>)}
                        </select>
                      </div>
                    </div>
                  </Card>

                  {/* Agent Access */}
                  <Card title="Agent Access">
                    <div style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, marginBottom: 14 }}>Controls local machine access for the chat agent.</div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 10, marginBottom: 12 }}>
                      {[
                        { mode: "strict", title: "Strict", color: palette.green, summary: "Web tools only." },
                        { mode: "balanced", title: "Balanced", color: palette.blue, summary: "Local files, confined access." },
                        { mode: "full", title: "Full", color: palette.red, summary: "Full filesystem + code execution." },

                        return (
                          <label key={profile.mode} style={{ cursor: "pointer", padding: "10px 12px", borderRadius: 8, border: `1px solid ${selected ? profile.color : palette.border}`, background: selected ? `${profile.color}20` : palette.bg, display: "flex", flexDirection: "column", gap: 6 }}>

                              <span style={{ fontSize: 12, fontWeight: 700, color: selected ? profile.color : palette.textBright }}>{profile.title}</span>

                            <span style={{ fontSize: 11, lineHeight: 1.45, color: palette.textDim }}>{profile.summary}</span>

                  </Card>

                  <Card title="MCP Bridge">

                          {bridgeStatus.server_count || 0} servers, {bridgeStatus.tool_count || 0} tools
                        </span>
                      </div>
                    ) : <span style={{ fontSize: 12, fontFamily: FONT_MONO, color: palette.textDim }}>Bridge status unavailable</span>}
                  </Card>

                  {/* Knowledge Store Status */}
                  <Card title="Knowledge Store">
                    {knowledgeStatus ? (
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <StatusPill status={knowledgeStatus.status || "active"} />
                        <span style={{ fontSize: 12, fontFamily: FONT_MONO, color: palette.textDim }}>
                          {knowledgeStatus.claim_count || claims.length} claims, {knowledgeStatus.entity_count || entities.length} entities
                        </span>
                      </div>
                    ) : <span style={{ fontSize: 12, fontFamily: FONT_MONO, color: palette.textDim }}>Knowledge store status unavailable</span>}
                  </Card>

                  {/* Event Bus Filters */}
                  <Card title="Event Bus Filters">
                    <div style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, marginBottom: 14 }}>Select which topic groups appear in the Event Bus tab</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                      {["observations", "claims", "goals", "tasks", "hil", "system", "chat", "channels", "inference", "entities", "queries", "ingestion"].map(group => {
                        const active = (displayPrefs.eventFilters || []).includes(group);
                        return (
                          <button key={group} onClick={() => toggleEventFilter(group)} style={{
                            padding: "6px 12px", borderRadius: 5, fontSize: 11, fontFamily: FONT_MONO, cursor: "pointer",
                            border: `1px solid ${active ? palette.accent + "60" : palette.border}`,
                            background: active ? palette.accentDim : "transparent",
                            color: active ? palette.accent : palette.textDim, fontWeight: active ? 600 : 400,
                          }}>{group}</button>
                        );
                      })}
                    </div>
                  </Card>

                  {/* Claims Display */}
                  <Card title="Claims Display">
                    <div style={{ display: "flex", gap: 20, marginBottom: 16 }}>

                          <input type="range" min="0" max="100" value={displayPrefs.minConfidence || 0} onChange={e => setDisplayPrefs(prev => ({ ...prev, minConfidence: parseInt(e.target.value) }))} style={{ flex: 1, accentColor: palette.accent }} />

                        </div>
                      </div>
                      <div style={{ flex: 1 }}>
                        <label style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.06em", display: "block", marginBottom: 6 }}>Time Range</label>
                        <select value={displayPrefs.timeRange || "all"} onChange={e => setDisplayPrefs(prev => ({ ...prev, timeRange: e.target.value }))} style={{ width: "100%", padding: "8px 10px", borderRadius: 5, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 13, outline: "none" }}>

                          <option value="1h">Last hour</option>
                          <option value="24h">Last 24 hours</option>
                          <option value="7d">Last 7 days</option>

                      </div>

                  </Card>

                  {/* Service Control */}
                  <Card title="Service Control">
                    {services.length === 0 ? <span style={{ fontSize: 12, fontFamily: FONT_MONO, color: palette.textDim }}>No services running</span> : (
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {services.map(s => (
                          <div key={s.service_id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: palette.bg, borderRadius: 6, border: `1px solid ${palette.border}` }}>
                            <StatusDot alive={s.status === "alive"} />
                            <span style={{ fontSize: 12, color: palette.text, flex: 1 }}>{s.display_name || s.service_id}</span>
                            <span style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim }}>t{s.turn_count || 0}</span>
                            {s.circuit_broken && (
                              <React.Fragment>
                                <Badge color={palette.red}>BROKEN</Badge>
                                <button onClick={() => handleResetCircuit(s.service_id)} style={{ padding: "4px 12px", borderRadius: 4, fontSize: 10, fontFamily: FONT_MONO, fontWeight: 600, border: "none", cursor: "pointer", background: palette.accentDim, color: palette.accent }}>Reset</button>
                              </React.Fragment>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </Card>

                  {/* Import / Export / Reset */}
                  <Card title="Import / Export / Reset">
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
                      <button onClick={exportSettingsBundle} style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>Export JSON</button>
                      <button onClick={() => fileImportRef.current && fileImportRef.current.click()} style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>Import JSON</button>
                      <input ref={fileImportRef} type="file" accept="application/json" style={{ display: "none" }} onChange={e => { const file = e.target.files && e.target.files[0]; if (file) importSettingsBundle(file); e.target.value = ""; }} />
                    </div>
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
                      <button onClick={() => resetSettingsSection("budget")} style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.textDim, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer" }}>Reset Budget</button>
                      <button onClick={() => resetSettingsSection("runtime")} style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.textDim, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer" }}>Reset Runtime</button>
                      <button onClick={() => resetSettingsSection("agent_access")} style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.textDim, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer" }}>Reset Agent Access</button>
                    </div>
                    <button onClick={handleFactoryReset} style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${palette.red}40`, background: palette.redDim, color: palette.red, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer" }}>Factory Reset (type RESET)</button>
                  </Card>

                  {/* Memory Settings */}
                  {(!settingsSearch || "memory retention consolidation tier".includes(settingsSearch.toLowerCase())) && (
                  <Card title="Memory & Retention">
                    <div style={{ display: "flex", gap: 20 }}>
                      <div style={{ flex: 1 }}>
                        <label style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.06em", display: "block", marginBottom: 6 }}>Episodic Retention (hours)</label>
                        <input type="number" min="1" max="720" value={settings.memory?.episodic_retention_hours ?? 72} onChange={e => updateSetting("memory", "episodic_retention_hours", parseInt(e.target.value) || 72)} style={{ width: 120, padding: "8px 10px", borderRadius: 5, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 13, outline: "none" }} />
                      </div>
                      <div style={{ flex: 1 }}>
                        <label style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.06em", display: "block", marginBottom: 6 }}>Consolidation Interval (min)</label>
                        <input type="number" min="5" max="1440" value={settings.memory?.consolidation_interval_min ?? 30} onChange={e => updateSetting("memory", "consolidation_interval_min", parseInt(e.target.value) || 30)} style={{ width: 120, padding: "8px 10px", borderRadius: 5, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 13, outline: "none" }} />
                      </div>
                    </div>
                    <div style={{ marginTop: 12 }}>
                      <Toggle checked={settings.memory?.auto_consolidate !== false} onChange={() => updateSetting("memory", "auto_consolidate", !(settings.memory?.auto_consolidate !== false))} label="Auto-consolidate episodic to semantic" />
                    </div>
                  </Card>
                  )}

                  {/* Hook Configuration */}
                  {(!settingsSearch || "hook event trigger callback".includes(settingsSearch.toLowerCase())) && (
                  <Card title="Event Hooks" collapsible defaultOpen={false}>
                    <div style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, marginBottom: 14 }}>Configure callbacks triggered by system events. Hooks execute when matching events occur.</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {["on_claim_committed", "on_goal_completed", "on_budget_alert", "on_emergency_stop", "on_hil_timeout"].map(hook => {
                        const val = (settings.hooks || {})[hook] || "";
                        return (
                          <div key={hook} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: palette.bg, borderRadius: 6, border: `1px solid ${palette.border}` }}>
                            <Badge color={palette.purple}>{hook.replace("on_", "").replace(/_/g, " ")}</Badge>
                            <input value={val} onChange={e => updateSetting("hooks", hook, e.target.value)} placeholder="webhook URL or command..." style={{ flex: 1, padding: "4px 8px", borderRadius: 4, border: `1px solid ${palette.border}`, background: palette.surface, color: palette.text, fontFamily: FONT_MONO, fontSize: 10, outline: "none" }} />
                            <StatusDot alive={!!val} />
                          </div>
                        );
                      })}
                    </div>
                  </Card>
                  )}

                  {/* Model Fallback Chain */}
                  {(!settingsSearch || "model fallback chain priority primary secondary".includes(settingsSearch.toLowerCase())) && (
                  <Card title="Model Fallback Chain">
                    <div style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, marginBottom: 14 }}>Configure fallback models for each tier. If the primary model fails, the system tries the next in sequence.</div>
                    {["fast", "balanced", "powerful"].map(tier => {
                      const chain = (settings.model_fallback || {})[tier] || [];
                      const tc = tier === "fast" ? palette.green : tier === "balanced" ? palette.blue : palette.accent;
                      return (
                        <div key={tier} style={{ marginBottom: 12, padding: "10px 14px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                            <span style={{ fontSize: 10, fontFamily: FONT_MONO, color: tc, textTransform: "uppercase", fontWeight: 700 }}>{tier}</span>
                            <span style={{ fontSize: 9, fontFamily: FONT_MONO, color: palette.textDim }}>Primary: {reconfigTiers[tier] || "not set"}</span>
                          </div>
                          <div style={{ display: "flex", gap: 6 }}>
                            {[0, 1, 2].map(idx => (
                              <input key={idx} value={chain[idx] || ""} onChange={e => {
                                const next = [...chain]; next[idx] = e.target.value; while (next.length > 0 && !next[next.length - 1]) next.pop();
                                updateSetting("model_fallback", tier, next);
                              }} placeholder={idx === 0 ? "Fallback 1" : idx === 1 ? "Fallback 2" : "Fallback 3"} style={{ flex: 1, padding: "4px 8px", borderRadius: 4, border: `1px solid ${palette.border}`, background: palette.surface, color: palette.text, fontFamily: FONT_MONO, fontSize: 10, outline: "none" }} />
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </Card>
                  )}

                  {/* Session Defaults */}
                  {(!settingsSearch || "session token context timeout default".includes(settingsSearch.toLowerCase())) && (
                  <Card title="Session Defaults">
                    <div style={{ display: "flex", gap: 20 }}>
                      <div style={{ flex: 1 }}>
                        <label style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.06em", display: "block", marginBottom: 6 }}>Max Tokens per Session</label>
                        <input type="number" min="1000" step="1000" value={settings.session?.max_tokens ?? 100000} onChange={e => updateSetting("session", "max_tokens", parseInt(e.target.value) || 100000)} style={{ width: 120, padding: "8px 10px", borderRadius: 5, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 13, outline: "none" }} />
                      </div>
                      <div style={{ flex: 1 }}>
                        <label style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.06em", display: "block", marginBottom: 6 }}>Session Timeout (min)</label>
                        <input type="number" min="5" max="1440" value={settings.session?.timeout_min ?? 60} onChange={e => updateSetting("session", "timeout_min", parseInt(e.target.value) || 60)} style={{ width: 120, padding: "8px 10px", borderRadius: 5, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 13, outline: "none" }} />
                      </div>
                    </div>
                  </Card>
                  )}

                  {/* Keyboard Shortcuts */}
                  <Card title="Keyboard Shortcuts">
                    <button onClick={() => setShowShortcuts(true)} style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>Open Shortcuts Reference</button>
                  </Card>

                  {/* Save Button */}
                  <button onClick={handleSettingsSave} disabled={!settingsDirty || settingsSaving} style={{
                    width: "100%", padding: "12px 20px", borderRadius: 8, border: "none",
                    cursor: settingsDirty && !settingsSaving ? "pointer" : "not-allowed",
                    background: settingsDirty && !settingsSaving ? `linear-gradient(135deg, ${palette.accent}, #c47e2a)` : palette.border,
                    color: settingsDirty && !settingsSaving ? "#fff" : palette.textDim,
                    fontFamily: FONT_MONO, fontSize: 14, fontWeight: 700, transition: "all 0.2s",
                  }}>{settingsSaving ? "Saving..." : settingsDirty ? "Save Settings" : "No Changes"}</button>
                </div>
                )}{/* end raw mode conditional */}
              </div>
            )}

            {/* ═══ FILES (Agent Profile Editor) ═══ */}
            {activeTab === "files" && (
              <div>
                {/* Agent Identity Overview */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 16 }}>
                  <div style={{ background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, padding: "12px 16px" }}>
                    <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", marginBottom: 4 }}>Profile</div>
                    <span style={{ fontSize: 16, fontWeight: 700, fontFamily: FONT_MONO, color: palette.accent }}>{activeProfile || "default"}</span>
                  </div>
                  <div style={{ background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, padding: "12px 16px" }}>
                    <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", marginBottom: 4 }}>Model (primary)</div>
                    <span style={{ fontSize: 13, fontWeight: 600, fontFamily: FONT_MONO, color: palette.textBright }}>{reconfigTiers.balanced || "not set"}</span>
                  </div>
                  <div style={{ background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, padding: "12px 16px" }}>
                    <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", marginBottom: 4 }}>Files</div>
                    <span style={{ fontSize: 16, fontWeight: 700, fontFamily: FONT_MONO, color: palette.blue }}>{profileFiles.length + playbooks.length}</span>
                  </div>
                  <div style={{ background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, padding: "12px 16px" }}>
                    <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", marginBottom: 4 }}>Playbooks</div>
                    <span style={{ fontSize: 16, fontWeight: 700, fontFamily: FONT_MONO, color: palette.purple }}>{playbooks.length}</span>
                  </div>
                </div>
              <div style={{ display: "flex", gap: 16, height: "calc(100vh - 180px)" }}>
                {/* File tree */}
                <div style={{ width: 240, minWidth: 240, background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, overflow: "auto" }}>
                  <div style={{ padding: "14px 16px", borderBottom: `1px solid ${palette.border}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: palette.textBright }}>Profile: {activeProfile || "default"}</span>
                  </div>
                  <div style={{ padding: 8 }}>
                    {profileFiles.length === 0 ? (
                      <EmptyState icon={Icons.files} message="No profile files" />
                    ) : profileFiles.map(f => (
                      <button key={f} onClick={() => fetchFileContent(f)} style={{
                        display: "block", width: "100%", textAlign: "left", padding: "8px 12px", borderRadius: 6, border: "none",
                        background: selectedFile === f ? palette.accentDim : "transparent",
                        color: selectedFile === f ? palette.accent : palette.text,
                        fontSize: 12, fontFamily: FONT_MONO, cursor: "pointer", marginBottom: 2,
                      }}>{f}</button>
                    ))}
                    {playbooks.length > 0 && (
                      <div>
                        <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, padding: "12px 12px 4px", textTransform: "uppercase", letterSpacing: "0.06em" }}>Playbooks</div>
                        {playbooks.map(p => (
                          <button key={p} onClick={() => fetchFileContent(`playbooks/${p}`)} style={{
                            display: "block", width: "100%", textAlign: "left", padding: "6px 12px 6px 20px", borderRadius: 6, border: "none",
                            background: selectedFile === `playbooks/${p}` ? palette.accentDim : "transparent",
                            color: selectedFile === `playbooks/${p}` ? palette.accent : palette.textDim,
                            fontSize: 11, fontFamily: FONT_MONO, cursor: "pointer",
                          }}>{p}</button>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
                {/* Editor */}
                <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                    <span style={{ fontSize: 13, fontWeight: 600, color: palette.textBright, flex: 1 }}>{selectedFile || "Select a file"}</span>
                    {selectedFile && (
                      <>
                        <button onClick={() => setFilePreview(v => !v)} style={{ padding: "4px 12px", borderRadius: 6, border: `1px solid ${palette.border}`, background: filePreview ? palette.accentDim : palette.surface, color: filePreview ? palette.accent : palette.textDim, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer" }}>{filePreview ? "Edit" : "Preview"}</button>
                        <button onClick={handleFileSave} disabled={!fileDirty} style={{ padding: "4px 12px", borderRadius: 6, border: "none", background: fileDirty ? palette.accent : palette.border, color: fileDirty ? "#fff" : palette.textDim, fontFamily: FONT_MONO, fontSize: 10, cursor: fileDirty ? "pointer" : "default" }}>Save</button>
                      </>
                    )}
                  </div>
                  {selectedFile ? (
                    filePreview ? (
                      <div style={{ flex: 1, padding: 20, background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, overflow: "auto", fontSize: 13, color: palette.text, lineHeight: 1.7, whiteSpace: "pre-wrap", fontFamily: FONT_MONO }}>{fileContent}</div>
                    ) : (
                      <textarea value={fileContent} onChange={e => { setFileContent(e.target.value); setFileDirty(true); }} style={{ flex: 1, padding: 16, background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, color: palette.text, fontFamily: FONT_MONO, fontSize: 13, lineHeight: 1.6, resize: "none", outline: "none" }} />
                    )
                  ) : (
                    <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <EmptyState icon={Icons.files} message="Select a file to edit" />
                    </div>
                  )}
                </div>
              </div>
              </div>
            )}

            {/* ═══ WORKFLOWS ═══ */}
            {activeTab === "workflows" && (
              <div>
                <SectionHeader title="Workflows" subtitle={`${workflows.length} workflows, ${workflowExecutions.length} recent executions`} actions={
                  <button onClick={() => setShowNewWorkflow(true)} style={{ padding: "6px 14px", borderRadius: 6, border: "none", background: palette.accent, color: "#fff", fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>
                    <Icon d={Icons.plus} size={12} color="#fff" style={{ marginRight: 6 }} /> New Workflow
                  </button>
                } />
                {showNewWorkflow && (
                  <Card title="Create New Workflow">
                    <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 12 }}>
                      <input value={newWorkflowName} onChange={e => setNewWorkflowName(e.target.value)} placeholder="Workflow name" style={{ padding: "8px 12px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 12, outline: "none" }} />
                      <textarea value={newWorkflowDesc} onChange={e => setNewWorkflowDesc(e.target.value)} placeholder="Description (optional)" rows={2} style={{ padding: "8px 12px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 12, outline: "none", resize: "vertical" }} />
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={async () => {
                          if (!newWorkflowName.trim()) { addToast("Name is required", palette.red); return; }
                          try {
                            const res = await fetch(`${API}/api/workflows`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name: newWorkflowName.trim(), description: newWorkflowDesc.trim() || null, nodes: [], edges: [] }) });
                            if (res.ok) { addToast("Workflow created", palette.green); setShowNewWorkflow(false); setNewWorkflowName(""); setNewWorkflowDesc(""); fetchWorkflows(); }

                        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

                              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                                <StatusDot alive={ch.active} />
                                <span style={{ fontSize: 13, fontWeight: 600, color: palette.textBright }}>{ch.name}</span>
                                <Badge color={palette.blue}>{ch.type || "unknown"}</Badge>

                              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                                <div>
                                  <label style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", display: "block", marginBottom: 4 }}>DM Policy</label>
                                  <select value={ch.dm_policy || "open"} onChange={async (e) => {
                                    try { await fetch(`${API}/api/communications/channels/${ch.name}/policy`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ dm_policy: e.target.value }) }); fetchCommunications(); addToast("Policy updated", palette.green); } catch {}

                                    <option value="allowlist">Allowlist Only</option>
                                    <option value="pairing">Pairing Required</option>
                                    <option value="disabled">Disabled</option>
                                  </select>
                                </div>
                                <div>
                                  <label style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", display: "block", marginBottom: 4 }}>Group Policy</label>
                                  <select value={ch.group_policy || "open"} onChange={async (e) => {
                                    try { await fetch(`${API}/api/communications/channels/${ch.name}/policy`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ group_policy: e.target.value }) }); fetchCommunications(); addToast("Policy updated", palette.green); } catch {}
                                  }} style={{ width: "100%", padding: "6px 8px", borderRadius: 5, border: `1px solid ${palette.border}`, background: palette.surface, color: palette.text, fontFamily: FONT_MONO, fontSize: 11, outline: "none" }}>
                                    <option value="open">Open</option>
                                    <option value="allowlist">Allowlist Only</option>
                                    <option value="disabled">Disabled</option>
                                  </select>

                              </div>
                              <div style={{ marginTop: 10 }}>

              const sessions = (usageData && usageData.sessions) || [];
              const maxVal = Math.max(...daily.map(d => usageView === "tokens" ? (d.tokens || 0) : (d.cost || 0)), 1);
              return (
              <div>
                <SectionHeader title="Usage Analytics" subtitle="Token and cost tracking over time" actions={

                } />

                <div style={{ display: "flex", gap: 12, marginBottom: 20, alignItems: "center", flexWrap: "wrap" }}>

                <Card title="Daily Usage">

                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>

                          <div key={d.date || i} style={{ display: "flex", alignItems: "center", gap: 10 }}>

                            <span style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.accent, minWidth: 60, textAlign: "right" }}>{usageView === "tokens" ? val.toLocaleString() : `$${val.toFixed(4)}`}</span>

                          <span style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.accent }}>${(m.cost || m.cost_usd || 0).toFixed(4)}</span>
                        </div>
                      ))}
                    </div>
                  </Card>
                )}
                {/* Sessions breakdown */}
                {sessions.length > 0 && (
                  <Card title="Sessions" collapsible defaultOpen={false}>
                    <DataTable
                      columns={[
                        { key: "session_id", label: "Session", render: r => <span style={{ fontFamily: FONT_MONO, fontSize: 11, color: palette.textDim }}>{(r.session_id || r.id || "").slice(0, 12)}</span> },

            {activeTab === "logs" && (() => {

              const filtered = logEntries.filter(e => {
                const lvl = (e.level || "info").toLowerCase();

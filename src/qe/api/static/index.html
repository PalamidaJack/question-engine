                if (logSearch && !(e.message || "").toLowerCase().includes(logSearch.toLowerCase()) && !JSON.stringify(e).toLowerCase().includes(logSearch.toLowerCase())) return false;
                return true;
              });
              const levelColors = { trace: palette.textDim, debug: palette.cyan, info: palette.blue, warn: palette.yellow, error: palette.red, fatal: palette.red };
              return (
              <div>
                <SectionHeader title="Logs" subtitle={`${filtered.length} entries (${logEntries.length} total)`} actions={
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => setLogPaused(v => !v)} style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${palette.border}`, background: logPaused ? palette.yellowDim : palette.surface, color: logPaused ? palette.yellow : palette.textDim, fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>{logPaused ? "Resume" : "Pause"}</button>
                    <button onClick={() => setLogEntries([])} style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.surface, color: palette.textDim, fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>Clear</button>
                    <button onClick={() => {
                      const blob = new Blob([filtered.map(e => JSON.stringify(e)).join("\n")], { type: "application/x-ndjson" });
                      const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "qe-logs.jsonl"; a.click(); URL.revokeObjectURL(url);
                    }} style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.surface, color: palette.textDim, fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>Export</button>
                  </div>
                } />
                {/* Level filters + search */}
                <div style={{ display: "flex", gap: 8, marginBottom: 16, alignItems: "center", flexWrap: "wrap" }}>
                  {["trace", "debug", "info", "warn", "error", "fatal"].map(lvl => (
                    <button key={lvl} onClick={() => setLogLevels(prev => ({ ...prev, [lvl]: !prev[lvl] }))} style={{
                      padding: "4px 12px", borderRadius: 5, fontSize: 10, fontFamily: FONT_MONO, cursor: "pointer", fontWeight: 600, textTransform: "uppercase",
                      border: `1px solid ${logLevels[lvl] ? (levelColors[lvl] || palette.textDim) + "60" : palette.border}`,
                      background: logLevels[lvl] ? (levelColors[lvl] || palette.textDim) + "18" : "transparent",
                      color: logLevels[lvl] ? (levelColors[lvl] || palette.textDim) : palette.textDim,
                    }}>{lvl}</button>
                  ))}
                  <div style={{ flex: 1, minWidth: 160, display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 6 }}>
                    <Icon d={Icons.search} size={12} color={palette.textDim} />
                    <input value={logSearch} onChange={e => setLogSearch(e.target.value)} placeholder="Search logs..." style={{ background: "none", border: "none", outline: "none", color: palette.text, fontFamily: FONT_MONO, fontSize: 11, width: "100%" }} />
                  </div>
                  <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, cursor: "pointer" }}>
                    <input type="checkbox" checked={logAutoFollow} onChange={() => setLogAutoFollow(v => !v)} style={{ accentColor: palette.accent }} />
                    Auto-follow
                  </label>
                </div>
                {/* Log entries */}
                <div style={{ background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, overflow: "hidden" }}>
                  <div style={{ maxHeight: "calc(100vh - 260px)", overflow: "auto", padding: 4 }}>
                    {filtered.length === 0 ? (
                      <EmptyState icon={Icons.bus} message={logEntries.length === 0 ? "Waiting for log entries... (connect via WebSocket)" : "No entries match filters"} />
                    ) : filtered.map((entry, i) => {
                      const lvl = (entry.level || "info").toLowerCase();
                      const c = levelColors[lvl] || palette.textDim;
                      return (
                        <div key={i} style={{ display: "flex", gap: 8, padding: "4px 10px", borderBottom: `1px solid ${palette.border}`, fontFamily: FONT_MONO, fontSize: 11, alignItems: "flex-start" }}>
                          <span style={{ color: palette.textDim, minWidth: 72, flexShrink: 0 }}>{entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString() : ""}</span>
                          <span style={{ color: c, minWidth: 44, textTransform: "uppercase", fontWeight: 600, flexShrink: 0 }}>{lvl}</span>
                          <span style={{ color: palette.text, flex: 1, whiteSpace: "pre-wrap", wordBreak: "break-all" }}>{entry.message || JSON.stringify(entry)}</span>
                        </div>
                      );
                    })}
                    <div ref={logEndRef} />
                  </div>
                </div>
              </div>
              );
            })()}

            {/* ═══ DEBUG ═══ */}
            {activeTab === "debug" && (
              <div>
                <SectionHeader title="Debug" subtitle="System snapshots and API explorer" actions={
                  <button onClick={fetchDebugSnapshot} style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.surface, color: palette.textDim, fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>Refresh Snapshots</button>
                } />
                {/* Snapshots */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
                  <Card title="Status Snapshot" collapsible defaultOpen={false}>
                    {debugSnapshot ? (
                      <pre style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.text, lineHeight: 1.5, maxHeight: 400, overflow: "auto", whiteSpace: "pre-wrap", wordBreak: "break-all" }}>{JSON.stringify(debugSnapshot, null, 2)}</pre>
                    ) : <EmptyState icon={Icons.system} message="Click Refresh to load" />}
                  </Card>
                  <Card title="Health Snapshot" collapsible defaultOpen={false}>
                    {debugHealthSnapshot ? (
                      <pre style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.text, lineHeight: 1.5, maxHeight: 400, overflow: "auto", whiteSpace: "pre-wrap", wordBreak: "break-all" }}>{JSON.stringify(debugHealthSnapshot, null, 2)}</pre>
                    ) : <EmptyState icon={Icons.health} message="Click Refresh to load" />}
                  </Card>
                </div>
                {/* Manual API Caller */}
                <Card title="API Explorer">
                  <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                    <select value={rpcMethod} onChange={e => setRpcMethod(e.target.value)} style={{ padding: "8px 10px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 12, width: 90, outline: "none" }}>
                      {["GET", "POST", "PUT", "DELETE", "PATCH"].map(m => <option key={m} value={m}>{m}</option>)}
                    </select>
                    <input value={rpcPath} onChange={e => setRpcPath(e.target.value)} placeholder="/api/health" style={{ flex: 1, padding: "8px 12px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 12, outline: "none" }} />
                    <button onClick={executeRpc} disabled={rpcLoading || !rpcPath.trim()} style={{ padding: "8px 20px", borderRadius: 6, border: "none", cursor: rpcLoading ? "not-allowed" : "pointer", background: rpcLoading ? palette.border : palette.accent, color: rpcLoading ? palette.textDim : palette.bg, fontFamily: FONT_MONO, fontSize: 12, fontWeight: 600 }}>{rpcLoading ? "..." : "Send"}</button>
                  </div>
                  {rpcMethod !== "GET" && (
                    <div style={{ marginBottom: 12 }}>
                      <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, marginBottom: 4 }}>REQUEST BODY (JSON)</div>
                      <textarea value={rpcBody} onChange={e => setRpcBody(e.target.value)} placeholder='{"key": "value"}' rows={4} style={{ width: "100%", padding: "10px 12px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 12, outline: "none", resize: "vertical", boxSizing: "border-box" }} />
                    </div>
                  )}
                  {/* Quick links */}
                  <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
                    {["/api/health", "/api/status", "/api/metrics", "/api/flags", "/api/claims", "/api/goals", "/api/memory/tiers", "/api/models"].map(p => (
                      <button key={p} onClick={() => { setRpcPath(p); setRpcMethod("GET"); }} style={{ padding: "3px 10px", borderRadius: 4, border: `1px solid ${palette.border}`, background: rpcPath === p ? palette.accentDim : "transparent", color: rpcPath === p ? palette.accent : palette.textDim, fontFamily: FONT_MONO, fontSize: 9, cursor: "pointer" }}>{p}</button>
                    ))}
                  </div>
                  {/* Response */}
                  {rpcResult && (
                    <div style={{ background: palette.bg, borderRadius: 8, border: `1px solid ${rpcResult.status >= 200 && rpcResult.status < 300 ? palette.green + "40" : palette.red + "40"}`, overflow: "hidden" }}>
                      <div style={{ padding: "8px 14px", borderBottom: `1px solid ${palette.border}`, display: "flex", alignItems: "center", gap: 10 }}>
                        <Badge color={rpcResult.status >= 200 && rpcResult.status < 300 ? palette.green : palette.red}>{rpcResult.status} {rpcResult.statusText}</Badge>
                        <button onClick={() => { navigator.clipboard.writeText(JSON.stringify(rpcResult.data, null, 2)); addToast("Copied", palette.green); }} style={{ marginLeft: "auto", padding: "3px 10px", borderRadius: 4, border: `1px solid ${palette.border}`, background: "transparent", color: palette.textDim, fontFamily: FONT_MONO, fontSize: 9, cursor: "pointer" }}>Copy</button>
                      </div>
                      <pre style={{ padding: "12px 14px", fontSize: 11, fontFamily: FONT_MONO, color: palette.text, lineHeight: 1.5, maxHeight: 400, overflow: "auto", whiteSpace: "pre-wrap", wordBreak: "break-all", margin: 0 }}>{typeof rpcResult.data === "string" ? rpcResult.data : JSON.stringify(rpcResult.data, null, 2)}</pre>
                    </div>
                  )}
                </Card>
              </div>
            )}

            {/* ═══ CRON JOBS ═══ */}
            {activeTab === "cron" && (
              <div>
                <SectionHeader title="Cron Jobs" subtitle="Scheduled tasks and recurring prompts" actions={
                  <button onClick={() => setShowNewCron(true)} style={{ padding: "6px 14px", borderRadius: 6, border: "none", background: palette.accent, color: "#fff", fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>
                    <Icon d={Icons.plus} size={12} color="#fff" style={{ marginRight: 6 }} /> New Job
                  </button>
                } />
                {/* Status metrics */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 20 }}>
                  <div style={{ background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, padding: "14px 18px" }}>
                    <Stat label="Status" value={cronEnabled ? "Enabled" : "Disabled"} color={cronEnabled ? palette.green : palette.textDim} />
                  </div>
                  <div style={{ background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, padding: "14px 18px" }}>
                    <Stat label="Jobs" value={cronJobs.length} color={palette.blue} />
                  </div>
                  <div style={{ background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, padding: "14px 18px" }}>
                    <Stat label="Next Wake" value={cronNextWake ? new Date(cronNextWake).toLocaleTimeString() : "N/A"} color={palette.accent} />
                  </div>
                </div>
                {/* New job form */}
                {showNewCron && (
                  <Card title="Create New Job">
                    <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 12 }}>
                      <input value={newCronName} onChange={e => setNewCronName(e.target.value)} placeholder="Job name (e.g. Nightly Backup)" style={{ padding: "8px 12px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 12, outline: "none" }} />
                      <textarea value={newCronPrompt} onChange={e => setNewCronPrompt(e.target.value)} placeholder="Prompt to execute (e.g. Check system health and report issues)" rows={3} style={{ padding: "8px 12px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 12, outline: "none", resize: "vertical" }} />
                      <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, marginBottom: 4 }}>SCHEDULE (cron expression)</div>
                          <input value={newCronSchedule} onChange={e => setNewCronSchedule(e.target.value)} placeholder="0 0 * * *" style={{ width: "100%", padding: "8px 12px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 12, outline: "none", boxSizing: "border-box" }} />
                        </div>
                        <div style={{ display: "flex", gap: 6, paddingTop: 18 }}>
                          {["0 * * * *", "0 0 * * *", "0 0 * * 0", "*/5 * * * *"].map(s => (
                            <button key={s} onClick={() => setNewCronSchedule(s)} style={{ padding: "4px 8px", borderRadius: 4, border: `1px solid ${palette.border}`, background: newCronSchedule === s ? palette.accentDim : "transparent", color: newCronSchedule === s ? palette.accent : palette.textDim, fontFamily: FONT_MONO, fontSize: 9, cursor: "pointer" }}>
                              {s === "0 * * * *" ? "Hourly" : s === "0 0 * * *" ? "Daily" : s === "0 0 * * 0" ? "Weekly" : "5min"}
                            </button>
                          ))}
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={handleCreateCronJob} style={{ padding: "6px 16px", borderRadius: 6, border: "none", background: palette.accent, color: "#fff", fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>Create</button>
                        <button onClick={() => { setShowNewCron(false); setNewCronName(""); setNewCronPrompt(""); }} style={{ padding: "6px 16px", borderRadius: 6, border: `1px solid ${palette.border}`, background: "transparent", color: palette.textDim, fontFamily: FONT_MONO, fontSize: 11, cursor: "pointer" }}>Cancel</button>
                      </div>
                    </div>
                  </Card>
                )}
                {/* Job list */}
                <Card title="Scheduled Jobs">
                  {cronJobs.length === 0 ? <EmptyState icon={Icons.workflow} message="No cron jobs configured. Create one to schedule recurring tasks." /> : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {cronJobs.map((job, i) => (
                        <div key={job.id || i} style={{ background: palette.bg, border: `1px solid ${palette.border}`, borderRadius: 8, padding: "14px 18px" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                            <StatusDot alive={job.enabled !== false} />
                            <span style={{ fontSize: 13, fontWeight: 600, color: palette.textBright, flex: 1 }}>{job.name || `Job ${i + 1}`}</span>
                            <Badge color={palette.blue}>{job.schedule || "manual"}</Badge>
                            <StatusPill status={job.enabled !== false ? "enabled" : "disabled"} />
                          </div>
                          <div style={{ fontSize: 12, fontFamily: FONT_MONO, color: palette.text, marginBottom: 8, padding: "8px 12px", background: palette.surface, borderRadius: 6, whiteSpace: "pre-wrap" }}>{job.prompt || job.description || "No prompt specified"}</div>
                          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                            <button onClick={() => handleCronAction(job.id, "run")} style={{ padding: "4px 10px", borderRadius: 4, border: `1px solid ${palette.green}40`, background: palette.greenDim, color: palette.green, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer" }}>Run Now</button>
                            <button onClick={() => handleCronAction(job.id, job.enabled !== false ? "disable" : "enable")} style={{ padding: "4px 10px", borderRadius: 4, border: `1px solid ${palette.border}`, background: "transparent", color: palette.textDim, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer" }}>{job.enabled !== false ? "Disable" : "Enable"}</button>
                            <button onClick={() => { setNewCronName(job.name + " (copy)"); setNewCronPrompt(job.prompt || ""); setNewCronSchedule(job.schedule || "0 0 * * *"); setShowNewCron(true); }} style={{ padding: "4px 10px", borderRadius: 4, border: `1px solid ${palette.border}`, background: "transparent", color: palette.textDim, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer" }}>Clone</button>
                            <button onClick={() => handleDeleteCronJob(job.id)} style={{ padding: "4px 10px", borderRadius: 4, border: `1px solid ${palette.red}40`, background: "transparent", color: palette.red, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer" }}>Remove</button>
                            {job.last_run && <span style={{ fontSize: 9, fontFamily: FONT_MONO, color: palette.textDim, marginLeft: "auto" }}>Last: {new Date(job.last_run).toLocaleString()}</span>}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </Card>
                {/* Execution history */}
                {cronHistory.length > 0 && (
                  <Card title="Execution History" collapsible defaultOpen={false}>
                    <DataTable
                      columns={[
                        { key: "timestamp", label: "Time", width: "140px", render: r => <span style={{ fontFamily: FONT_MONO, fontSize: 10, color: palette.textDim }}>{r.timestamp ? new Date(r.timestamp).toLocaleString() : ""}</span> },
                        { key: "job_name", label: "Job", render: r => <span style={{ fontFamily: FONT_MONO, fontSize: 12, color: palette.textBright }}>{r.job_name || r.name || "unknown"}</span> },
                        { key: "status", label: "Status", width: "80px", render: r => <StatusPill status={r.status || "unknown"} /> },
                        { key: "duration", label: "Duration", width: "80px", render: r => <span style={{ fontFamily: FONT_MONO, fontSize: 10, color: palette.textDim }}>{r.duration_ms ? `${r.duration_ms}ms` : ""}</span> },
                      ]}
                      rows={cronHistory}
                      maxHeight={300}
                    />
                  </Card>
                )}
              </div>
            )}

            </div>{/* end animation wrapper */}
          </main>

          {/* ── Command Palette ── */}
          {commandOpen && (
            <div onClick={() => setCommandOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 2000, display: "flex", alignItems: "flex-start", justifyContent: "center", paddingTop: "10vh" }}>
              <div onClick={e => e.stopPropagation()} style={{ width: "min(720px, 92vw)", background: palette.surface, border: `1px solid ${palette.borderBright}`, borderRadius: 10, boxShadow: "0 18px 80px rgba(0,0,0,0.5)", overflow: "hidden" }}>
                <div style={{ padding: "12px 14px", borderBottom: `1px solid ${palette.border}` }}>
                  <input autoFocus value={commandQuery} onChange={e => setCommandQuery(e.target.value)} onKeyDown={e => { if (e.key === "Escape") setCommandOpen(false); if (e.key === "Enter" && filteredActions.length > 0) { filteredActions[0].run(); setCommandOpen(false); setCommandQuery(""); } }} placeholder="Type a command or screen name..." style={{ width: "100%", padding: "8px 10px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.text, fontFamily: FONT_MONO, fontSize: 12, outline: "none" }} />
                </div>
                <div style={{ maxHeight: "50vh", overflow: "auto", padding: 8 }}>
                  {filteredActions.length === 0 && <div style={{ fontSize: 11, color: palette.textDim, fontFamily: FONT_MONO, padding: "8px 10px" }}>No commands found.</div>}
                  {filteredActions.map(action => (
                    <button key={action.id} onClick={() => { action.run(); setCommandOpen(false); setCommandQuery(""); }} style={{ width: "100%", textAlign: "left", padding: "9px 10px", borderRadius: 6, border: "none", background: "transparent", color: palette.text, cursor: "pointer", fontFamily: FONT_MONO, fontSize: 12, display: "flex", justifyContent: "space-between" }}>
                      <span>{action.label}</span>
                      <span style={{ color: palette.textDim }}>{action.kind}</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ── Shortcuts Modal ── */}
          {showShortcuts && (
            <div onClick={() => setShowShortcuts(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 2100, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <div onClick={e => e.stopPropagation()} style={{ width: "min(560px, 92vw)", background: palette.surface, border: `1px solid ${palette.borderBright}`, borderRadius: 10, padding: "14px 16px" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: palette.textBright }}>Keyboard Shortcuts</div>
                  <button onClick={() => setShowShortcuts(false)} style={{ border: "none", background: "transparent", color: palette.textDim, fontFamily: FONT_MONO, cursor: "pointer" }}>ESC</button>
                </div>
                <div style={{ display: "grid", gap: 6 }}>
                  {[
                    ["⌘/Ctrl + K", "Open command palette"],
                    ["⌘/Ctrl + S", "Save settings (Settings tab)"],
                    ["⌘/Ctrl + /", "Open shortcut reference"],
                    ["⌘/Ctrl + 1", "Go to Dashboard"],
                    ["⌘/Ctrl + 2", "Go to Chat"],
                    ["⌘/Ctrl + 3", "Go to Knowledge"],
                    ["⌘/Ctrl + 4", "Go to Settings"],
                  ].map(([k, v]) => (
                    <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "6px 8px", background: palette.bg, border: `1px solid ${palette.border}`, borderRadius: 6 }}>
                      <span style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.accent }}>{k}</span>
                      <span style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim }}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ── Toasts ── */}
          <ToastContainer toasts={toasts} removeToast={removeToast} />
        </div>
      );
    }

    /* ── Root ──────────────────────────────────────────────────────────── */
    function Root() {
      const [setupComplete, setSetupComplete] = useState(null);

      useEffect(() => {
        fetch(`${API}/api/setup/status`).then(r => r.json()).then(data => setSetupComplete(data.complete)).catch(() => setSetupComplete(false));
      }, []);

      if (setupComplete === null) {
        return (
          <div style={{ minHeight: "100vh", background: palette.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ fontFamily: FONT_MONO, color: palette.textDim, fontSize: 14 }}>Loading...</div>
          </div>
        );
      }
      if (!setupComplete) return <SetupWizard onComplete={() => setSetupComplete(true)} />;
      return <App />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>

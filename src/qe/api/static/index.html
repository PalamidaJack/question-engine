<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question Engine OS</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <script src="/static/settings_helpers.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0c10; overflow: hidden; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e2330; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a3040; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes emergencyPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(244,64,96,0.4); } 50% { box-shadow: 0 0 0 8px rgba(244,64,96,0); } }
    button:hover { filter: brightness(1.1); }
    textarea::placeholder, input::placeholder { color: #5c6478; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const API = window.location.origin;
    const WS_URL = `ws://${window.location.host}/api/chat/ws`;
    const SettingsHelpers = window.QESettingsHelpers;

    const FONT_MONO = "'IBM Plex Mono', 'Fira Code', 'SF Mono', monospace";
    const FONT_SANS = "'IBM Plex Sans', 'DM Sans', system-ui, sans-serif";

    const palette = {
      bg: "#0a0c10", surface: "#12151c", surfaceHover: "#181c26",
      border: "#1e2330", borderBright: "#2a3040",
      text: "#c8cdd8", textDim: "#5c6478", textBright: "#e8ecf4",
      accent: "#e09840", accentDim: "rgba(224,152,64,0.15)",
      green: "#3ddc84", greenDim: "rgba(61,220,132,0.12)",
      red: "#f44060", redDim: "rgba(244,64,96,0.12)",
      blue: "#4a9eff", blueDim: "rgba(74,158,255,0.10)",
      purple: "#a78bfa",
      yellow: "#fbbf24", yellowDim: "rgba(251,191,36,0.12)",
      cyan: "#22d3ee", cyanDim: "rgba(34,211,238,0.10)",
    };

    /* ── Icons ──────────────────────────────────────────────────────────── */
    const Icon = ({ d, size = 16, color = palette.textDim, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, ...style }}>
        <path d={d} />
      </svg>
    );

    const Icons = {
      dashboard: "M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z M9 22V12h6v10",
      submit: "M12 19V5 M5 12l7-7 7 7",
      claims: "M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2 M9 5a2 2 0 002 2h2a2 2 0 002-2 M9 5a2 2 0 012-2h2a2 2 0 012 2",
      ask: "M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3 M12 17h.01 M12 2a10 10 0 100 20 10 10 0 000-20z",
      entities: "M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2 M9 7a4 4 0 100-8 4 4 0 000 8z M23 21v-2a4 4 0 00-3-3.87 M16 3.13a4 4 0 010 7.75",
      hil: "M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2 M8.5 7a4 4 0 100-8 4 4 0 000 8z M20 8v6 M23 11h-6",
      chat: "M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z",
      bus: "M22 12h-4l-3 9L9 3l-3 9H2",
      check: "M20 6L9 17l-5-5",
      x: "M18 6L6 18 M6 6l12 12",
      search: "M11 3a8 8 0 100 16 8 8 0 000-16z M21 21l-4.35-4.35",
      trash: "M3 6h18 M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2",
      alert: "M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z M12 9v4 M12 17h.01",
      system: "M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5",
      settings: "M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z M12 8a4 4 0 100 8 4 4 0 000-8z",
      scout: "M12 2L2 22h20L12 2z M12 8v6 M12 16h.01",
      metrics: "M18 20V10 M12 20V4 M6 20v-6",
      flag: "M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z M4 22v-7",
      shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",
      emergency: "M12 2a10 10 0 100 20 10 10 0 000-20z M12 6v6l4 2",
      memory: "M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z M12 6v6 M12 18h.01",
      harvest: "M12 2L2 7l10 5 10-5-10-5z M2 12l10 5 10-5",
      brain: "M12 2a9 9 0 019 9c0 3.87-2.4 7.17-5.8 8.5L12 22l-3.2-2.5A9.004 9.004 0 013 11a9 9 0 019-9z M9 11a3 3 0 106 0 3 3 0 00-6 0z",
      peers: "M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2 M9 7a4 4 0 100-8 4 4 0 000 8z M23 21v-2a4 4 0 00-3-3.87 M16 3.13a4 4 0 010 7.75",
      audit: "M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z M14 2v6h6 M16 13H8 M16 17H8 M10 9H8",
      ingest: "M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4 M17 8l-5-5-5 5 M12 3v12",
      dlq: "M3 6h18 M8 6V4h8v2 M10 11v6 M14 11v6 M5 6v12a2 2 0 002 2h10a2 2 0 002-2V6",
      copy: "M20 9h-9a2 2 0 00-2 2v9a2 2 0 002 2h9a2 2 0 002-2v-9a2 2 0 00-2-2z M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1",
      play: "M5 3l14 9-14 9V3z",
      pause: "M6 4h4v16H6z M14 4h4v16h-4z",
      refresh: "M23 4v6h-6 M1 20v-6h6 M3.51 9a9 9 0 0114.85-3.36L23 10 M1 14l4.64 4.36A9 9 0 0020.49 15",
      plus: "M12 5v14 M5 12h14",
      download: "M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4 M7 10l5 5 5-5 M12 15V3",
      files: "M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9l-7-7z M13 2v7h7",
      workflow: "M5 3v4M3 5h4M6 17v4m-2-2h4M13 3l4 4M17 3l-4 4M13 17l4 4M17 17l-4 4M9 12h6M12 9v6",
      modelIntel: "M12 2L2 7l10 5 10-5-10-5z M2 17l10 5 10-5 M2 12l10 5 10-5",
      comms: "M22 2l-7 20-4-9-9-4 20-7z M22 2L11 13",
      health: "M22 12h-4l-3 9L9 3l-3 9H2",
      star: "M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z",
      grid: "M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z",
    };

    /* ── Base Shared Components ─────────────────────────────────────────── */
    const Badge = ({ children, color = palette.accent, bg }) => (
      <span style={{
        display: "inline-flex", alignItems: "center", gap: 4,
        padding: "2px 8px", borderRadius: 4, fontSize: 11, fontFamily: FONT_MONO,
        color, background: bg || `${color}18`, fontWeight: 600, letterSpacing: "0.02em",
        lineHeight: "18px", whiteSpace: "nowrap",
      }}>{children}</span>
    );

    const StatusDot = ({ alive }) => (
      <span style={{
        display: "inline-block", width: 8, height: 8, borderRadius: "50%",
        background: alive ? palette.green : palette.red, flexShrink: 0,
        boxShadow: alive ? `0 0 6px ${palette.green}80` : `0 0 6px ${palette.red}80`,
      }} />
    );

    const Stat = ({ label, value, sub, color = palette.textBright }) => (
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        <span style={{ fontSize: 11, color: palette.textDim, fontFamily: FONT_MONO, textTransform: "uppercase", letterSpacing: "0.08em" }}>{label}</span>
        <span style={{ fontSize: 28, fontWeight: 700, fontFamily: FONT_MONO, color, lineHeight: 1 }}>{value}</span>
        {sub && <span style={{ fontSize: 11, color: palette.textDim, fontFamily: FONT_MONO }}>{sub}</span>}
      </div>
    );

    const EmptyState = ({ icon, message }) => (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "48px 24px", gap: 12, opacity: 0.5 }}>
        <Icon d={icon} size={32} color={palette.textDim} />
        <span style={{ fontSize: 13, color: palette.textDim, fontFamily: FONT_MONO }}>{message}</span>
      </div>
    );

    /* ── New Shared Components ──────────────────────────────────────────── */
    const SectionHeader = ({ title, subtitle, actions }) => (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 700, color: palette.textBright, marginBottom: subtitle ? 4 : 0 }}>{title}</h1>
          {subtitle && <p style={{ fontSize: 13, color: palette.textDim, fontFamily: FONT_MONO }}>{subtitle}</p>}
        </div>
        {actions && <div style={{ display: "flex", gap: 8 }}>{actions}</div>}
      </div>
    );

    const Card = ({ title, children, accent, collapsible, defaultOpen = true }) => {
      const [open, setOpen] = useState(defaultOpen);
      return (
        <div style={{ background: palette.surface, border: `1px solid ${accent ? accent + "30" : palette.border}`, borderRadius: 8, overflow: "hidden" }}>
          {title && (
            <div onClick={collapsible ? () => setOpen(v => !v) : undefined} style={{
              padding: "14px 18px", borderBottom: open ? `1px solid ${palette.border}` : "none",
              display: "flex", alignItems: "center", justifyContent: "space-between",
              cursor: collapsible ? "pointer" : "default",
            }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: palette.textBright }}>{title}</span>
              {collapsible && <span style={{ fontSize: 10, color: palette.textDim, fontFamily: FONT_MONO }}>{open ? "▲" : "▼"}</span>}
            </div>
          )}
          {open && <div style={{ padding: title ? "16px 18px" : "16px 18px" }}>{children}</div>}
        </div>
      );
    };

    const DataTable = ({ columns, rows, onRowClick, emptyMessage, maxHeight }) => {
      if (!rows || rows.length === 0) return <EmptyState icon={Icons.claims} message={emptyMessage || "No data."} />;
      return (
        <div style={{ overflow: "hidden" }}>
          <div style={{
            display: "grid", gridTemplateColumns: columns.map(c => c.width || "1fr").join(" "),
            padding: "10px 18px", borderBottom: `1px solid ${palette.border}`,
            fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.06em",
          }}>
            {columns.map(c => <span key={c.key}>{c.label}</span>)}
          </div>
          <div style={{ maxHeight: maxHeight || 500, overflow: "auto" }}>
            {rows.map((row, i) => (
              <div key={row._key || i} onClick={onRowClick ? () => onRowClick(row) : undefined} style={{
                display: "grid", gridTemplateColumns: columns.map(c => c.width || "1fr").join(" "),
                padding: "10px 18px", borderBottom: `1px solid ${palette.border}`, alignItems: "center",
                fontSize: 12, cursor: onRowClick ? "pointer" : "default",
              }}>
                {columns.map(c => <span key={c.key} style={c.style || {}}>{c.render ? c.render(row) : row[c.key]}</span>)}
              </div>
            ))}
          </div>
        </div>
      );
    };

    const Toggle = ({ checked, onChange, label, disabled }) => (
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div onClick={disabled ? undefined : onChange} style={{
          width: 38, height: 22, borderRadius: 11, cursor: disabled ? "not-allowed" : "pointer",
          background: checked ? palette.green : palette.border,
          transition: "background 0.2s", position: "relative", flexShrink: 0,
          opacity: disabled ? 0.5 : 1,
        }}>
          <div style={{
            width: 18, height: 18, borderRadius: "50%", background: "#fff",
            position: "absolute", top: 2, left: checked ? 18 : 2, transition: "left 0.2s",
          }} />
        </div>
        {label && <span style={{ fontSize: 12, color: palette.text }}>{label}</span>}
      </div>
    );

    const ProgressRing = ({ value, size = 64, color = palette.accent, label }) => {
      const r = (size - 8) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (Math.min(100, Math.max(0, value)) / 100) * circ;
      return (
        <div style={{ position: "relative", width: size, height: size, display: "inline-flex", alignItems: "center", justifyContent: "center" }}>
          <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: "rotate(-90deg)" }}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={palette.border} strokeWidth="4" />
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4"
              strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.5s ease" }} />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontSize: size > 50 ? 16 : 11, fontWeight: 700, fontFamily: FONT_MONO, color }}>{Math.round(value)}%</span>
            {label && <span style={{ fontSize: 9, color: palette.textDim, fontFamily: FONT_MONO }}>{label}</span>}
          </div>
        </div>
      );
    };

    const TabBar = ({ tabs, active, onChange }) => (
      <div style={{ display: "flex", gap: 2, marginBottom: 20, background: palette.bg, borderRadius: 8, padding: 3, border: `1px solid ${palette.border}` }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => onChange(t.id)} style={{
            flex: 1, padding: "8px 14px", borderRadius: 6, border: "none", cursor: "pointer",
            background: active === t.id ? palette.surface : "transparent",
            color: active === t.id ? palette.accent : palette.textDim,
            fontFamily: FONT_MONO, fontSize: 11, fontWeight: active === t.id ? 600 : 400,
            transition: "all 0.15s",
          }}>{t.label}{t.count != null ? ` (${t.count})` : ""}</button>
        ))}
      </div>
    );

    const Sparkline = ({ data = [], color = palette.accent, width = 60, height = 20 }) => {
      if (!data || data.length < 2) return <span style={{ width, height, display: "inline-block" }} />;
      const max = Math.max(...data, 1);
      const min = Math.min(...data, 0);
      const range = max - min || 1;
      const points = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * height}`).join(" ");
      return (
        <svg width={width} height={height} style={{ flexShrink: 0 }}>
          <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      );
    };

    const StatusPill = ({ status }) => {
      const colors = { pass: palette.green, fail: palette.red, warn: palette.yellow, enabled: palette.green, disabled: palette.textDim, error: palette.red, active: palette.green, paused: palette.yellow, completed: palette.blue, cancelled: palette.textDim, unknown: palette.textDim, healthy: palette.green, degraded: palette.yellow, down: palette.red };
      const c = colors[(status || "").toLowerCase()] || palette.textDim;
      return (
        <span style={{
          display: "inline-flex", alignItems: "center", gap: 5, padding: "2px 10px",
          borderRadius: 12, fontSize: 10, fontFamily: FONT_MONO, fontWeight: 600,
          color: c, background: `${c}18`, textTransform: "uppercase", letterSpacing: "0.04em",
        }}>
          <span style={{ width: 6, height: 6, borderRadius: "50%", background: c }} />
          {status || "unknown"}
        </span>
      );
    };

    const AlertBanner = ({ type = "info", message, onDismiss }) => {
      const colors = { info: palette.blue, warning: palette.yellow, error: palette.red, success: palette.green };
      const c = colors[type] || palette.blue;
      if (!message) return null;
      return (
        <div style={{
          display: "flex", alignItems: "center", gap: 10, padding: "10px 16px",
          background: `${c}12`, border: `1px solid ${c}40`, borderRadius: 8, marginBottom: 16,
          animation: "fadeIn 0.3s ease",
        }}>
          <Icon d={type === "error" ? Icons.alert : Icons.check} size={16} color={c} />
          <span style={{ flex: 1, fontSize: 13, color: c, fontFamily: FONT_MONO }}>{message}</span>
          {onDismiss && (
            <button onClick={onDismiss} style={{ background: "none", border: "none", cursor: "pointer", padding: 2 }}>
              <Icon d={Icons.x} size={14} color={c} />
            </button>
          )}
        </div>
      );
    };

    const ToastContainer = ({ toasts, removeToast }) => (
      <div style={{ position: "fixed", bottom: 20, right: 20, zIndex: 3000, display: "flex", flexDirection: "column", gap: 8, maxWidth: 360 }}>
        {toasts.map(t => (
          <div key={t.id} style={{
            padding: "10px 16px", borderRadius: 8, fontFamily: FONT_MONO, fontSize: 12,
            background: palette.surface, border: `1px solid ${t.color || palette.accent}40`,
            color: t.color || palette.accent, animation: "fadeIn 0.3s ease",
            display: "flex", alignItems: "center", gap: 8, boxShadow: "0 4px 24px rgba(0,0,0,0.4)",
          }}>
            <span style={{ flex: 1 }}>{t.message}</span>
            <button onClick={() => removeToast(t.id)} style={{ background: "none", border: "none", cursor: "pointer" }}>
              <Icon d={Icons.x} size={12} color={palette.textDim} />
            </button>
          </div>
        ))}
      </div>
    );

    /* ── Topic / Confidence / Claim Components ─────────────────────────── */
    function TopicBadge({ topic }) {
      const colors = {
        "observations": palette.blue, "claims": palette.purple,
        "hil": palette.accent, "system": palette.textDim,
        "investigations": palette.green, "queries": palette.blue,
        "entities": palette.green, "ingestion": palette.accent,
      };
      const prefix = topic.split(".")[0];
      const isContradiction = topic === "claims.contradiction_detected";
      return <Badge color={isContradiction ? palette.red : (colors[prefix] || palette.textDim)}>{topic}</Badge>;
    }

    function ConfidenceBar({ value }) {
      const pct = Math.round(value * 100);
      const color = value > 0.8 ? palette.green : value > 0.6 ? palette.accent : palette.red;
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 40, height: 4, background: palette.border, borderRadius: 2, overflow: "hidden" }}>
            <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 2 }} />
          </div>
          <span style={{ fontSize: 11, fontFamily: FONT_MONO, color }}>{pct}%</span>
        </div>
      );
    }

    function InlineClaimCard({ claim }) {
      return (
        <div style={{
          padding: "8px 12px", borderLeft: `3px solid ${palette.blue}`,
          marginTop: 6, background: palette.bg, borderRadius: "0 4px 4px 0",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <Badge color={palette.blue}>{claim.subject_entity_id}</Badge>
            <span style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim }}>{claim.predicate}</span>
            <span style={{ fontSize: 12, color: palette.text, flex: 1 }}>{claim.object_value}</span>
            {claim.confidence != null && <ConfidenceBar value={claim.confidence} />}
          </div>
        </div>
      );
    }

    function PipelineProgress({ events, complete }) {
      const stages = [
        { label: "Submitted", done: true },
        { label: "Extracting", done: events.some(e => e.topic === "claims.proposed") },
        { label: "Committed", done: events.some(e => e.topic === "claims.committed") },
      ];
      return (
        <div style={{ marginTop: 8, padding: "8px 12px", background: palette.bg, borderRadius: 6, border: `1px solid ${palette.border}` }}>
          <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, marginBottom: 6, textTransform: "uppercase" }}>
            Pipeline {complete ? "Complete" : "Processing..."}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            {stages.map((s, i) => (
              <React.Fragment key={i}>
                <div style={{ display: "flex", alignItems: "center", gap: 4, color: s.done ? palette.green : palette.textDim, fontSize: 11, fontFamily: FONT_MONO }}>
                  {s.done ? <Icon d={Icons.check} size={12} color={palette.green} /> : <span style={{ animation: "pulse 1.5s infinite" }}>...</span>}
                  {s.label}
                </div>

    /* ── System Map / Dashboard Widgets ─────────────────────────────────── */
    function PipelineFunnel({ events }) {
      const counts = {
        observations: events.filter(e => e.topic && e.topic.startsWith("observations.")).length,
        proposed: events.filter(e => e.topic === "claims.proposed").length,
        committed: events.filter(e => e.topic === "claims.committed").length,

      const stages = [
        { label: "Observations", count: counts.observations, color: palette.blue },
        { label: "Proposed", count: counts.proposed, color: palette.purple },

        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>

            const prev = i > 0 ? stages[i - 1].count : null;

              <React.Fragment key={s.label}>

                  <span style={{ fontSize: 28, fontWeight: 700, fontFamily: FONT_MONO, color: s.color, lineHeight: 1 }}>{s.count}</span>

              </React.Fragment>

    function BudgetGauge({ budget }) {
      if (!budget) return null;
      const remaining = budget.remaining_pct || 0;
      const spent = budget.total_spend || 0;
      const limit = budget.limit_usd || 5;
      const usedPct = Math.min(100, Math.max(0, 100 - remaining));
      const color = remaining > 50 ? palette.green : remaining > 20 ? palette.accent : palette.red;
      const models = budget.by_model || {};
      return (
        <div style={{ background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, padding: "16px 20px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.06em" }}>Budget Usage</span>
            <span style={{ fontSize: 13, fontFamily: FONT_MONO, color }}>${spent.toFixed(4)} / ${limit.toFixed(2)}</span>
          </div>
          <div style={{ height: 8, background: palette.border, borderRadius: 4, overflow: "hidden", marginBottom: 12 }}>
            <div style={{ width: `${usedPct}%`, height: "100%", background: color, borderRadius: 4, transition: "width 0.5s ease" }} />
          </div>
          {Object.keys(models).length > 0 && (
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>

                <div key={model} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ width: 8, height: 8, borderRadius: 2, background: palette.accent }} />
                  <span style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim }}>{model}</span>

                </div>

    function TopicActivity({ events }) {
      const topicCounts = {};
      events.forEach(e => { if (e.topic) topicCounts[e.topic] = (topicCounts[e.topic] || 0) + 1; });
      const sorted = Object.entries(topicCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);
      if (sorted.length === 0) return null;
      const max = sorted[0][1];
      return (
        <div style={{ background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, padding: "16px 20px" }}>
          <div style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 12 }}>Topic Activity</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {sorted.map(([topic, count]) => (
              <div key={topic} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ minWidth: 160 }}><TopicBadge topic={topic} /></div>
                <div style={{ flex: 1, height: 4, background: palette.border, borderRadius: 2, overflow: "hidden" }}>
                  <div style={{ width: `${(count / max) * 100}%`, height: "100%", background: palette.accent, borderRadius: 2, transition: "width 0.3s" }} />
                </div>
                <span style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, minWidth: 28, textAlign: "right" }}>{count}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SystemMapGraph({ services, events }) {
      const containerRef = useRef(null);
      const netRef = useRef(null);
      const nodesDs = useRef(null);
      const edgesDs = useRef(null);
      const prevEventId = useRef(null);
      const svcKey = services.map(s => s.service_id).sort().join(",");

      useEffect(() => {
        if (!containerRef.current) return;
        const V = window.vis;
        if (!V || !V.Network) return;
        const nodes = new V.DataSet();
        const edges = new V.DataSet();
        nodesDs.current = nodes;
        edgesDs.current = edges;
        nodes.add({ id: "_bus", label: "Memory\nBus", shape: "diamond", size: 30, color: { background: "#1a1510", border: palette.accent }, font: { color: palette.accent, face: "IBM Plex Mono", size: 11, multi: true }, fixed: { x: true, y: true }, x: 0, y: 0 });
        nodes.add({ id: "_api", label: "API", shape: "triangleDown", size: 18, color: { background: "#0d1520", border: palette.blue }, font: { color: palette.blue, face: "IBM Plex Mono", size: 11 } });
        edges.add({ id: "e__api", from: "_api", to: "_bus", color: { color: palette.blue + "50" }, width: 2, arrows: "to" });
        services.forEach(svc => {
          const alive = svc.status === "alive";
          const broken = svc.circuit_broken;
          const bc = broken ? palette.red : alive ? palette.green : palette.textDim;
          nodes.add({ id: svc.service_id, label: (svc.display_name || svc.service_id).replace(/ /g, "\n"), shape: "dot", size: 16, color: { background: bc + "20", border: bc }, font: { color: palette.text, face: "IBM Plex Mono", size: 10, multi: true }, title: (svc.display_name || svc.service_id) + "\nStatus: " + svc.status + "\nTurns: " + svc.turn_count + (broken ? "\nCIRCUIT BROKEN" : "") });
          edges.add({ id: "e_" + svc.service_id, from: "_bus", to: svc.service_id, color: { color: palette.border }, width: 1.5, arrows: "to" });
        });
        const net = new V.Network(containerRef.current, { nodes, edges }, {
          physics: { barnesHut: { gravitationalConstant: -3000, centralGravity: 0.3, springLength: 140, springConstant: 0.04 }, stabilization: { iterations: 80 } },
          interaction: { hover: true, tooltipDelay: 150, zoomView: true, dragView: true },
          nodes: { borderWidth: 2, shadow: { enabled: true, color: "rgba(0,0,0,0.3)", size: 5 } },
          edges: { smooth: { type: "continuous" } },
        });
        netRef.current = net;
        return () => { net.destroy(); netRef.current = null; nodesDs.current = null; edgesDs.current = null; };
      }, [svcKey]);

      useEffect(() => {
        const ds = nodesDs.current;
        if (!ds) return;
        services.forEach(svc => {
          try { const alive = svc.status === "alive"; const broken = svc.circuit_broken; const bc = broken ? palette.red : alive ? palette.green : palette.textDim; ds.update({ id: svc.service_id, color: { background: bc + "20", border: bc } }); } catch (e) {}
        });
      }, [services]);

      useEffect(() => {
        const nds = nodesDs.current; const eds = edgesDs.current;
        if (!nds || !eds || events.length === 0) return;
        const latest = events[0];
        if (!latest || latest.envelope_id === prevEventId.current) return;
        prevEventId.current = latest.envelope_id;
        const sid = latest.source_service_id; const eid = "e_" + sid;
        try { eds.update({ id: eid, color: { color: palette.accent }, width: 3 }); } catch (e) {}
        try { nds.update({ id: sid, size: 22, borderWidth: 3 }); } catch (e) {}
        setTimeout(() => {
          try { eds.update({ id: eid, color: { color: palette.border }, width: 1.5 }); } catch (e) {}
          try { nds.update({ id: sid, size: 16, borderWidth: 2 }); } catch (e) {}
        }, 700);
      }, [events]);

      if (typeof window.vis === "undefined") {
        return (<div style={{ height: 380, display: "flex", alignItems: "center", justifyContent: "center", background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, marginBottom: 16 }}><span style={{ fontSize: 12, fontFamily: FONT_MONO, color: palette.textDim }}>Loading visualization library...</span></div>);
      }
      return <div ref={containerRef} style={{ height: 380, background: "#0e1018", border: `1px solid ${palette.border}`, borderRadius: 8, marginBottom: 16 }} />;
    }

    /* ── Hatching Screen ──────────────────────────────────────────────── */
    function HatchingScreen({ onReady }) {
      const [progress, setProgress] = useState(0);
      const [phases, setPhases] = useState({ substrate_ready: false, event_log_ready: false, services_subscribed: false, supervisor_ready: false });
      const [statusText, setStatusText] = useState("Initializing substrate...");
      const [ready, setReady] = useState(false);

      useEffect(() => {
        const phaseLabels = [
          { key: "substrate_ready", text: "Wiring services..." },
          { key: "event_log_ready", text: "Spawning agents..." },
          { key: "services_subscribed", text: "Almost there..." },
          { key: "supervisor_ready", text: "Engine ready!" },
        ];
        const interval = setInterval(async () => {
          try {
            const res = await fetch(`${API}/api/health/ready`);
            const data = await res.json();
            if (data.phases) {
              setPhases(data.phases);
              const completed = Object.values(data.phases).filter(Boolean).length;
              setProgress(Math.round((completed / 4) * 100));
              for (let i = phaseLabels.length - 1; i >= 0; i--) {
                if (data.phases[phaseLabels[i].key]) { setStatusText(phaseLabels[i].text); break; }
              }
            }
            if (data.ready) { setReady(true); setProgress(100); setStatusText("Engine ready!"); clearInterval(interval); setTimeout(() => onReady(), 1500); }
          } catch {}
        }, 1000);
        return () => clearInterval(interval);
      }, [onReady]);

      const circumference = 2 * Math.PI * 54;
      const dashOffset = circumference - (progress / 100) * circumference;
      const phaseItems = [
        { key: "substrate_ready", label: "Initialize substrate" },
        { key: "event_log_ready", label: "Connect event log" },
        { key: "services_subscribed", label: "Subscribe services" },
        { key: "supervisor_ready", label: "Start supervisor" },
      ];

      return (
        <div style={{ minHeight: "100vh", background: palette.bg, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FONT_SANS }}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 32, animation: "fadeIn 0.4s ease" }}>
            <div style={{ position: "relative", width: 128, height: 128 }}>
              <svg width="128" height="128" viewBox="0 0 128 128" style={{ transform: "rotate(-90deg)" }}>
                <circle cx="64" cy="64" r="54" fill="none" stroke={palette.border} strokeWidth="4" />
                <circle cx="64" cy="64" r="54" fill="none" stroke={palette.accent} strokeWidth="4" strokeDasharray={circumference} strokeDashoffset={dashOffset} strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.5s ease" }} />
              </svg>
              <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontFamily: FONT_MONO, fontWeight: 800, color: palette.accent, animation: ready ? "none" : "pulse 2s ease-in-out infinite" }}>QE</div>
            </div>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: palette.textBright, marginBottom: 6 }}>{statusText}</div>
              <div style={{ fontSize: 13, fontFamily: FONT_MONO, color: palette.textDim }}>{progress}% complete</div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, minWidth: 240 }}>
              {phaseItems.map(item => (
                <div key={item.key} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 20, height: 20, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", background: phases[item.key] ? palette.greenDim : "transparent", border: `1px solid ${phases[item.key] ? palette.green : palette.border}`, transition: "all 0.3s" }}>
                    {phases[item.key] && <Icon d={Icons.check} size={12} color={palette.green} />}
                  </div>
                  <span style={{ fontSize: 13, fontFamily: FONT_MONO, color: phases[item.key] ? palette.green : palette.textDim, transition: "color 0.3s" }}>{item.label}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ── Setup Wizard ─────────────────────────────────────────────────── */
    function SetupWizard({ onComplete }) {
      const [step, setStep] = useState(1);
      const [hatching, setHatching] = useState(false);
      const [providers, setProviders] = useState([]);
      const [tierConfig, setTierConfig] = useState({ fast: { provider: "", model: "" }, balanced: { provider: "", model: "" }, powerful: { provider: "", model: "" } });
      const [apiKeys, setApiKeys] = useState({});
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState(null);
      const [ollamaEnabled, setOllamaEnabled] = useState(false);
      const [availableChannels, setAvailableChannels] = useState([]);
      const [selectedChannels, setSelectedChannels] = useState({});
      const [channelConfig, setChannelConfig] = useState({});

      useEffect(() => {
        fetch(`${API}/api/setup/providers`).then(r => r.json()).then(data => setProviders(data.providers || [])).catch(() => {});
        fetch(`${API}/api/setup/status`).then(r => r.json()).then(data => {
          if (data.tiers) {
            const tiers = {};
            for (const [tier, model] of Object.entries(data.tiers)) { tiers[tier] = { provider: detectProvider(model, data.providers || []), model }; }
            setTierConfig(prev => ({ ...prev, ...tiers }));
          }
        }).catch(() => {});
        fetch(`${API}/api/setup/channels`).then(r => r.json()).then(data => setAvailableChannels(data.channels || [])).catch(() => {});
      }, []);

      const detectProvider = (model, provList) => {
        if (!model) return "";
        if (model.startsWith("ollama/")) return "Ollama (local)";
        if (model.startsWith("groq/")) return "Groq";
        if (model.startsWith("mistral/")) return "Mistral";
        if (model.startsWith("gemini/")) return "Google Gemini";
        if (model.startsWith("together_ai/")) return "Together AI";
        if (model.startsWith("openrouter/")) return "OpenRouter";
        if (model.startsWith("claude")) return "Anthropic";
        return "OpenAI";
      };
      const getProviderByName = (name) => providers.find(p => p.name === name);
      const handleProviderChange = (tier, providerName) => {
        const prov = getProviderByName(providerName);
        const model = prov ? (prov.tier_defaults[tier] || prov.example_models[0]) : "";
        setTierConfig(prev => ({ ...prev, [tier]: { provider: providerName, model } }));
        if (providerName === "Ollama (local)") setOllamaEnabled(true);
      };
      const handleModelChange = (tier, model) => setTierConfig(prev => ({ ...prev, [tier]: { ...prev[tier], model } }));
      const handleKeyChange = (envVar, value) => setApiKeys(prev => ({ ...prev, [envVar]: value }));
      const toggleChannel = (channelId) => setSelectedChannels(prev => ({ ...prev, [channelId]: !prev[channelId] }));
      const handleChannelInput = (key, value) => setChannelConfig(prev => ({ ...prev, [key]: value }));

      const neededKeys = {};
      Object.values(tierConfig).forEach(tc => {
        const prov = getProviderByName(tc.provider);
        if (prov && prov.env_var && !neededKeys[prov.env_var]) neededKeys[prov.env_var] = prov.name;
      });

      const handleSave = async () => {
        setSaving(true); setError(null);
        try {
          const res = await fetch(`${API}/api/setup/save`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ providers: apiKeys, tiers: tierConfig, channels: channelConfig }) });
          const data = await res.json();
          if (!res.ok) { setError(data.error || "Save failed"); setSaving(false); return; }

                <div style={{ width: 32, height: 32, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontFamily: FONT_MONO, fontWeight: 700, background: step >= s.num ? palette.accentDim : "transparent", border: `2px solid ${step >= s.num ? palette.accent : palette.border}`, color: step >= s.num ? palette.accent : palette.textDim, transition: "all 0.3s" }}>{step > s.num ? <Icon d={Icons.check} size={14} color={palette.accent} /> : s.num}</div>
                <span style={{ fontSize: 11, fontFamily: FONT_MONO, color: step >= s.num ? palette.text : palette.textDim, whiteSpace: "nowrap" }}>{s.label}</span>

          <div style={{ width: "100%", maxWidth: 720, background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 12, padding: "40px 36px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 8 }}>
              <div style={{ width: 44, height: 44, borderRadius: 8, background: palette.accentDim, display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid ${palette.accent}40`, fontSize: 18, fontFamily: FONT_MONO, color: palette.accent, fontWeight: 800 }}>QE</div>
              <div>
                <div style={{ fontSize: 20, fontWeight: 700, color: palette.textBright }}>Welcome to Question Engine</div>
                <div style={{ fontSize: 13, color: palette.textDim, fontFamily: FONT_MONO }}>Configure your LLM providers to get started</div>

    /* ── Chat Progress Panel ──────────────────────────────────────────── */
    function ChatProgressPanel({ progress, toolStream }) {
      if (!progress) return null;
      const isComplete = progress.phase === "complete";
      const elapsed = progress.elapsed_ms || progress.total_elapsed_ms || 0;
      const elapsedStr = elapsed < 1000 ? `${elapsed}ms` : `${(elapsed / 1000).toFixed(1)}s`;
      const tokens = progress.cumulative_tokens || progress.final_tokens || {};
      const cost = progress.cumulative_cost_usd || progress.final_cost_usd || 0;
      const iter = (progress.iteration || 0) + 1;
      const maxIter = progress.max_iterations || 20;
      let phaseLabel = "Thinking...";
      if (progress.phase === "llm_start") phaseLabel = "Reasoning...";
      else if (progress.phase === "llm_complete" && progress.has_tool_calls) phaseLabel = `Planning ${progress.tool_count} tool call${progress.tool_count > 1 ? "s" : ""}...`;
      else if (progress.phase === "llm_complete") phaseLabel = "Generating response...";
      else if (progress.phase === "tool_start") phaseLabel = `Running: ${progress.tool_name} (${(progress.tool_index || 0) + 1}/${progress.tool_count})`;
      else if (progress.phase === "tool_complete") phaseLabel = `Completed: ${progress.tool_name}`;
      else if (progress.phase === "complete") phaseLabel = "Done";
      const pct = Math.min(100, Math.round((iter / maxIter) * 100));

      return (
        <div style={{ padding: "10px 16px", marginBottom: 12, borderRadius: 10, background: palette.surface, border: `1px solid ${palette.border}`, fontFamily: FONT_MONO, fontSize: 11 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, color: palette.textDim }}>
            <span style={{ color: palette.accent, fontWeight: 600 }}>Step {iter}/{maxIter}</span>
            <span>{elapsedStr}</span>
            <span>{(tokens.total || 0).toLocaleString()} tok</span>
            {cost > 0 && <span>${cost.toFixed(4)}</span>}
          </div>
          <div style={{ marginBottom: 6, color: isComplete ? palette.green : palette.text, fontWeight: 500, fontSize: 12, animation: isComplete ? "none" : "pulse 1.5s infinite" }}>{phaseLabel}</div>
          <div style={{ height: 3, background: palette.border, borderRadius: 2, marginBottom: toolStream.length > 0 ? 6 : 0, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pct}%`, background: palette.accent, borderRadius: 2, transition: "width 0.3s ease" }} />
          </div>
          {toolStream.length > 0 && (
            <div style={{ maxHeight: 120, overflowY: "auto", display: "flex", flexDirection: "column", gap: 2 }}>
              {toolStream.map((t, i) => (
                <div key={t._key || i} style={{ display: "flex", justifyContent: "space-between", gap: 8, color: t.phase === "tool_complete" ? palette.textDim : palette.text, fontSize: 10 }}>
                  <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.phase === "tool_complete" ? "\u2713" : "\u25b6"} {t.tool_name}</span>
                  {t.duration_ms != null && <span style={{ flexShrink: 0 }}>{t.duration_ms}ms</span>}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

          setMassIntelProgress(p => p >= 90 ? 90 : p + Math.random() * 8);
        }, 500);

        try {
          let url = `${API}/api/mass-intelligence/query?prompt=${encodeURIComponent(prompt)}`;
          // Use filtered models when free-only is on and no manual selection
          const effectiveModels = massIntelSelected.size > 0
            ? [...massIntelSelected]
            : (massIntelFreeOnly ? massIntelFilteredModels.map(m => m.model_id) : []);
          if (effectiveModels.length > 0) url += `&model_ids=${encodeURIComponent(effectiveModels.join(","))}`;
          if (massIntelExtendedTimeout) url += `&timeout_seconds=90`;
          const res = await fetch(url, { method: "POST" });
          if (res.ok) { setMassIntelResult(await res.json()); addToast("Query complete", palette.green); }
          else { addToast("Query failed: " + res.status, palette.red); }
        } catch { addToast("Query failed", palette.red); }
        clearInterval(progressTimer);
        setMassIntelProgress(100);
        setTimeout(() => setMassIntelProgress(0), 800);
        setMassIntelLoading(false);
        setMassIntelConsensus(null);
      };

      const handleMassIntelConsensus = async () => {
        if (!massIntelResult || massIntelConsensusLoading) return;
        const successful = (massIntelResult.responses || []).filter(r => r.success && r.response);
        if (successful.length < 2) { addToast("Need at least 2 successful responses", palette.red); return; }
        setMassIntelConsensusLoading(true);
        setMassIntelConsensus(null);
        try {
          const res = await fetch(`${API}/api/mass-intelligence/consensus`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: massIntelResult.prompt, responses: successful.map(r => ({ model_name: r.model_name, response: r.response })) }),
          });
          if (res.ok) { const data = await res.json(); setMassIntelConsensus(data); addToast("Consensus generated", palette.green); }
          else { addToast("Consensus failed: " + res.status, palette.red); }
        } catch { addToast("Consensus generation failed", palette.red); }
        setMassIntelConsensusLoading(false);
      };

      // Guardrails
      const handleGuardrailToggle = async (key, name, enabled) => {
        try {
          await fetch(`${API}/api/guardrails/configure`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ [key]: !enabled }) });
          fetchGuardrails(); addToast(`Guard "${name}" ${enabled ? "disabled" : "enabled"}`, palette.accent);
        } catch {}
      };

      // Scout approve/reject
      const handleScoutApprove = async (id) => { try { await fetch(`${API}/api/scout/proposals/${id}/approve`, { method: "POST" }); fetchScout(); addToast("Proposal approved", palette.green); } catch {} };
      const handleScoutReject = async (id) => {
        const reason = scoutRejectReasons[id] || "";
        try { await fetch(`${API}/api/scout/proposals/${id}/reject`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ reason }) }); fetchScout(); addToast("Proposal rejected", palette.red); } catch {}
      };

      // Chat WebSocket — one per panel
      useEffect(() => {
        if (activeTab !== "chat") return;
        const panelIds = chatPanels.map(p => p.id);
        panelIds.forEach(pid => {
          if (chatWsRefs.current[pid]) return;
          const chatWs = new WebSocket(`ws://${window.location.host}/api/chat/ws/chat`);
          chatWs.onopen = () => console.log(`Chat WS connected [${pid}]`);
          chatWs.onmessage = (msg) => {
            try {
              const data = JSON.parse(msg.data);
              if (data.type === "session_init") {
                updatePanel(pid, { sessionId: data.session_id });
                if (data.permissions) {
                  const saved = localStorage.getItem("qe_agent_permissions");
                  if (saved) {
                    try {
                      const override = JSON.parse(saved);
                      setAgentPermissions(override);
                      chatWs.send(JSON.stringify({ type: "set_permissions", scopes: override }));
                    } catch { setAgentPermissions(data.permissions.scopes); }
                  } else {
                    setAgentPermissions(data.permissions.scopes);
                  }
                }
              }
              if (data.type === "permissions_updated") setAgentPermissions(data.scopes);
              if (data.type === "typing") updatePanel(pid, { typing: data.active });
              if (data.type === "chat_progress") {
                updatePanel(pid, { progress: data });
                if (data.phase === "tool_start" || data.phase === "tool_complete") {
                  updatePanelFn(pid, "toolStream", prev => { const key = `${data.iteration}-${data.tool_index}`; const existing = prev.findIndex(e => e._key === key); const entry = { ...data, _key: key }; if (existing >= 0) { const next = [...prev]; next[existing] = entry; return next; } return [...prev, entry]; });
                }
                if (data.phase === "complete") {
                  const finalTokens = (data.final_tokens || data.cumulative_tokens || {}).total || 0;
                  const finalCost = data.final_cost_usd || data.cumulative_cost_usd || 0;
                  if (finalTokens > 0 || finalCost > 0) updatePanelFn(pid, "totalTokens", prev => (prev || 0) + finalTokens);
                  if (finalCost > 0) updatePanelFn(pid, "totalCost", prev => (prev || 0) + finalCost);
                  setTimeout(() => { updatePanel(pid, { progress: null, toolStream: [] }); }, 3000);
                }
              }
              if (data.type === "chat_response") {
                updatePanelFn(pid, "messages", prev => [...prev, { id: data.message_id, role: "assistant", content: data.reply_text, intent: data.intent, claims: data.claims || [], entities: data.entities || [], confidence: data.confidence, reasoning: data.reasoning, pipeline_complete: data.pipeline_complete, tracking_envelope_id: data.tracking_envelope_id, suggestions: data.suggestions || [], timestamp: new Date().toISOString() }]);
                updatePanel(pid, { typing: false });
                if (data.tracking_envelope_id) chatWs.send(JSON.stringify({ type: "track_envelope", envelope_id: data.tracking_envelope_id }));
              }
              if (data.type === "pipeline_event") {
                updatePanelFn(pid, "pipelineEvents", prev => { const key = data.correlation_id; return { ...prev, [key]: [...(prev[key] || []), data] }; });
                if (data.topic === "claims.committed") updatePanelFn(pid, "messages", prev => prev.map(m => m.tracking_envelope_id === data.correlation_id ? { ...m, pipeline_complete: true } : m));
              }
              if (data.type === "error") updatePanelFn(pid, "messages", prev => [...prev, { id: `err_${Date.now()}`, role: "system", content: data.error, timestamp: new Date().toISOString() }]);
            } catch {}
          };
          chatWs.onclose = () => { if (chatWsRefs.current[pid] === chatWs) delete chatWsRefs.current[pid]; };
          chatWsRefs.current[pid] = chatWs;
        });
        return () => { Object.keys(chatWsRefs.current).forEach(k => { if (chatWsRefs.current[k]) chatWsRefs.current[k].close(); }); chatWsRefs.current = {}; };
      }, [activeTab, chatPanels.length]);

      // Scroll all panels when messages update
      useEffect(() => { Object.values(chatEndRefs.current).forEach(el => { if (el) el.scrollIntoView({ behavior: "smooth" }); }); }, [chatPanels]);

      const handleChatSend = () => {
        if (!chatInput.trim()) return;
        const hasWs = chatPanels.some(p => chatWsRefs.current[p.id]);
        if (!hasWs) return;
        const text = chatInput.trim();
        const userMsg = { id: `user_${Date.now()}`, role: "user", content: text, timestamp: new Date().toISOString() };
        chatPanels.forEach(p => {
          updatePanelFn(p.id, "messages", prev => [...prev, userMsg]);
          const ws = chatWsRefs.current[p.id];
          if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "message", content: text, model: p.model || undefined }));
        });
        setChatInput("");
      };
      const handleSubmit = async () => {
        if (!observationText.trim()) return; setSubmitting(true);
        try { const res = await fetch(`${API}/api/submit`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text: observationText.trim() }) }); if (res.ok) { setObservationText(""); setTimeout(fetchClaims, 3000); addToast("Observation submitted", palette.green); } } catch {}
        setSubmitting(false);
      };
      const handleAsk = async () => {
        if (!question.trim()) return; setAsking(true); setAnswer(null);
        try { const res = await fetch(`${API}/api/ask`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ question: question.trim() }) }); if (res.ok) setAnswer(await res.json()); } catch {}
        setAsking(false);
      };
      const handleRetract = async (claimId) => { if (!confirm("Retract this claim?")) return; try { await fetch(`${API}/api/claims/${claimId}`, { method: "DELETE" }); fetchClaims(); } catch {} };
      const handleHilDecision = async (id, decision) => { try { await fetch(`${API}/api/hil/${id}/${decision}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ reason: "user decision" }) }); fetchHil(); addToast(`Request ${decision}d`, decision === "approve" ? palette.green : palette.red); } catch {} };
      const handleEventReplay = async (envelopeId) => {
        try { await fetch(`${API}/api/events/replay`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ envelope_id: envelopeId }) }); addToast("Event replayed", palette.accent); } catch {}
      };

      const filteredClaims = claims.filter(c => {
        if (searchQuery) { const q = searchQuery.toLowerCase(); if (!(c.subject_entity_id || "").toLowerCase().includes(q) && !(c.object_value || "").toLowerCase().includes(q) && !(c.claim_id || "").includes(q)) return false; }
        if (displayPrefs.minConfidence > 0 && (c.confidence || 0) < displayPrefs.minConfidence / 100) return false;
        if (displayPrefs.timeRange && displayPrefs.timeRange !== "all" && c.created_at) { const cutoffs = { "1h": 3600000, "24h": 86400000, "7d": 604800000 }; const cutoff = cutoffs[displayPrefs.timeRange]; if (cutoff && (Date.now() - new Date(c.created_at).getTime()) > cutoff) return false; }
        return true;
      });
      const pendingHil = hilQueue.filter(h => h.status === "pending").length;

      /* ── Navigation ─────────────────────────────────────────────────── */
      const navGroups = [
        { label: "CORE", items: [
          { id: "chat", label: "Chat", icon: Icons.chat },
          { id: "workflows", label: "Workflows", icon: Icons.workflow },
          { id: "goals", label: "Goals", icon: Icons.check },
        ]},
        { label: "AGENT", items: [
          { id: "files", label: "Files", icon: Icons.files },
          { id: "memory", label: "Memory", icon: Icons.memory },
        ]},
        { label: "MODELS", items: [
          { id: "modelintel", label: "Model Intelligence", icon: Icons.modelIntel },
        ]},
        { label: "OPERATIONS", items: [
          { id: "usage", label: "Usage", icon: Icons.metrics },
          { id: "cron", label: "Cron Jobs", icon: Icons.workflow },
        ]},
        { label: "SAFETY", items: [
          { id: "guardrails", label: "Guardrails", icon: Icons.shield },
          { id: "emergency", label: "Emergency", icon: Icons.emergency },
          { id: "hil", label: "HIL Queue", icon: Icons.hil, count: pendingHil },
        ]},
        { label: "SYSTEM", items: [
          { id: "health", label: "Health", icon: Icons.health },
          { id: "peers", label: "Peers", icon: Icons.peers },
          { id: "communications", label: "Communications", icon: Icons.comms },
          { id: "bus", label: "Event Bus", icon: Icons.bus, count: events.length },
          { id: "flags", label: "Feature Flags", icon: Icons.flag },
          { id: "logs", label: "Logs", icon: Icons.bus },
          { id: "debug", label: "Debug", icon: Icons.system },
          { id: "audit", label: "Audit", icon: Icons.audit },
          { id: "settings", label: "Settings", icon: Icons.settings },
        ]},
      ];

      const allNavItems = navGroups.flatMap(g => g.items);
      const quickActions = [
        ...allNavItems.map(i => ({ id: `nav_${i.id}`, label: `Go to ${i.label}`, kind: "navigation", run: () => setActiveTab(i.id) })),
        { id: "act_refresh_claims", label: "Refresh claims", kind: "action", run: () => fetchClaims() },
        { id: "act_refresh_flags", label: "Refresh feature flags", kind: "action", run: () => fetchFlags() },
        { id: "act_save_settings", label: "Save settings", kind: "action", run: () => handleSettingsSave() },
        { id: "act_export_settings", label: "Export settings JSON", kind: "action", run: () => exportSettingsBundle() },
        { id: "act_emergency_stop", label: "Emergency stop", kind: "action", run: () => { setActiveTab("emergency"); } },
      ];
      const filteredActions = quickActions.filter(a => a.label.toLowerCase().includes(commandQuery.toLowerCase().trim())).slice(0, 12);

      // Keyboard shortcuts
      useEffect(() => {
        const handler = (e) => {
          const key = (e.key || "").toLowerCase();
          const meta = e.metaKey || e.ctrlKey;
          if (meta && key === "k") { e.preventDefault(); setCommandOpen(v => !v); return; }
          if (meta && key === "s") { if (activeTab === "settings") { e.preventDefault(); handleSettingsSave(); } return; }
          if (meta && key === "/") { e.preventDefault(); setShowShortcuts(v => !v); return; }
          if (!meta) return;
          if (key === "1") setActiveTab("chat");
          if (key === "2") setActiveTab("workflows");
          if (key === "3") setActiveTab("modelintel");
          if (key === "4") setActiveTab("settings");
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [activeTab, settingsDirty, settings]);

      /* ── Render ─────────────────────────────────────────────────────── */
      return (
        <div style={{ display: "flex", height: "100vh", width: "100%", background: palette.bg, fontFamily: FONT_SANS, color: palette.text, overflow: "hidden" }}>

          {/* ── Sidebar ── */}
          <nav style={{ width: 220, minWidth: 220, background: palette.surface, borderRight: `1px solid ${palette.border}`, display: "flex", flexDirection: "column" }}>
            <div style={{ padding: "20px 16px 16px", borderBottom: `1px solid ${palette.border}`, display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 32, height: 32, borderRadius: 6, background: palette.accentDim, display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid ${palette.accent}40`, fontSize: 14, fontFamily: FONT_MONO, color: palette.accent, fontWeight: 800 }}>QE</div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, color: palette.textBright }}>Question Engine</div>
                <div style={{ fontSize: 10, color: palette.textDim, fontFamily: FONT_MONO }}>v0.4.0</div>
              </div>
            </div>
            <div style={{ padding: "12px 16px", borderBottom: `1px solid ${palette.border}` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <StatusDot alive={engineRunning} />
                <span style={{ fontSize: 11, fontFamily: FONT_MONO, color: engineRunning ? palette.green : palette.textDim }}>{engineRunning ? "ENGINE ONLINE" : "ENGINE OFFLINE"}</span>
              </div>
              {budget && <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, marginBottom: 8 }}>Budget: ${budget.total_spend?.toFixed(4)} / ${budget.limit_usd?.toFixed(2)}</div>}
              {emergencyActive && <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.red, fontWeight: 600, marginBottom: 8, animation: "pulse 1.5s infinite" }}>EMERGENCY STOP ACTIVE</div>}
              <button onClick={() => setCommandOpen(true)} style={{ width: "100%", padding: "6px 8px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.bg, color: palette.textDim, fontSize: 10, fontFamily: FONT_MONO, cursor: "pointer", textAlign: "left" }}>
                Command Palette  |  ⌘K
              </button>
            </div>
            <div style={{ padding: "4px 8px", flex: 1, overflow: "auto" }}>
              {navGroups.map(group => (
                <div key={group.label}>
                  <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.08em", padding: "12px 10px 4px", fontWeight: 600 }}>{group.label}</div>
                  {group.items.map(item => {
                    const active = activeTab === item.id;
                    return (
                      <button key={item.id} onClick={() => setActiveTab(item.id)} style={{
                        display: "flex", alignItems: "center", gap: 10, width: "100%",
                        padding: "8px 10px", borderRadius: 6, border: "none", cursor: "pointer",
                        background: active ? palette.accentDim : "transparent",
                        color: active ? palette.accent : palette.textDim,
                        fontFamily: FONT_SANS, fontSize: 13, fontWeight: active ? 600 : 400,
                        marginBottom: 1, textAlign: "left",
                      }}>
                        <Icon d={item.icon} size={16} color={active ? palette.accent : palette.textDim} />
                        <span style={{ flex: 1 }}>{item.label}</span>
                        {item.count > 0 && <span style={{ fontSize: 10, fontFamily: FONT_MONO, padding: "1px 6px", borderRadius: 10, background: active ? `${palette.accent}30` : palette.border, color: active ? palette.accent : palette.textDim }}>{item.count}</span>}
                      </button>
                    );
                  })}
                </div>
              ))}
            </div>
            {contradictions.length > 0 && (
              <div style={{ padding: "8px 12px", borderTop: `1px solid ${palette.border}`, background: palette.redDim }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                  <Icon d={Icons.alert} size={14} color={palette.red} />
                  <span style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.red, fontWeight: 600 }}>CONTRADICTIONS ({contradictions.length})</span>
                </div>
                <span style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.red }}>{contradictions[0]?.subject} / {contradictions[0]?.predicate}</span>
              </div>
            )}
          </nav>

          {/* ── Main Content ── */}
          <main style={{ flex: 1, overflow: "auto", padding: "24px 32px" }}>
            <div style={{ animation: "fadeIn 0.2s ease" }}>

            {/* ═══ DASHBOARD removed — Chat is now default ═══ */}

            {/* ═══ CHAT ═══ */}
            {activeTab === "chat" && (() => {
              const anyTyping = chatPanels.some(p => p.typing);
              return (
              <div style={{ display: "flex", height: "calc(100vh - 48px)" }}>
                {/* Conversation sidebar */}
                {showConvSidebar && (
                  <div style={{ width: 260, minWidth: 260, background: palette.surface, borderRight: `1px solid ${palette.border}`, display: "flex", flexDirection: "column", marginRight: 16, borderRadius: 8, overflow: "hidden" }}>
                    <div style={{ padding: "12px 14px", borderBottom: `1px solid ${palette.border}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: palette.textBright }}>History</span>
                      <button onClick={() => setShowConvSidebar(false)} style={{ background: "none", border: "none", cursor: "pointer" }}><Icon d={Icons.x} size={14} color={palette.textDim} /></button>
                    </div>
                    <div style={{ flex: 1, overflow: "auto", padding: 8 }}>
                      {conversations.length === 0 ? (
                        <div style={{ padding: 16, fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, textAlign: "center" }}>No conversations yet</div>
                      ) : conversations.map(c => (
                        <div key={c.id || c.conversation_id} style={{ padding: "8px 10px", borderRadius: 6, marginBottom: 2, background: palette.bg, border: `1px solid ${palette.border}` }}>
                          <div style={{ fontSize: 12, color: palette.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.title || "Untitled"}</div>
                          <div style={{ fontSize: 10, fontFamily: FONT_MONO, color: palette.textDim }}>{c.created_at ? new Date(c.created_at).toLocaleDateString() : ""} | {c.model || ""}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
                <div style={{ marginBottom: 16, flexShrink: 0 }}>
                  <SectionHeader title="Chat" subtitle="Talk to the Question Engine" actions={
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <button onClick={() => setShowConvSidebar(v => !v)} style={{ padding: "4px 10px", borderRadius: 6, border: `1px solid ${palette.border}`, background: showConvSidebar ? palette.accentDim : palette.surface, color: showConvSidebar ? palette.accent : palette.textDim, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer" }}>History</button>
                      <label style={{ display: "flex", alignItems: "center", gap: 4, fontFamily: FONT_MONO, fontSize: 10, color: palette.textDim, cursor: "pointer" }}>
                        <input type="checkbox" checked={chatFreeOnly} onChange={e => setChatFreeOnly(e.target.checked)} />
                        Free only
                      </label>
                      <button onClick={addChatPanel} style={{ padding: "4px 10px", borderRadius: 6, border: `1px solid ${palette.border}`, background: palette.surface, color: palette.accent, fontFamily: FONT_MONO, fontSize: 10, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
                        <Icon d={Icons.plus} size={12} color={palette.accent} /> Add Panel
                      </button>
                      {chatPanels.length > 1 && <span style={{ fontFamily: FONT_MONO, fontSize: 10, color: palette.textDim }}>{chatPanels.length} panels</span>}
                    </div>
                  } />
                </div>
                {/* ── Permissions Panel ── */}
                {agentPermissions && (() => {
                  const PSCOPES = [
                    { key: "web_access",     label: "Web Access",      desc: "Search & browse the web" },
                    { key: "file_system",    label: "File System",     desc: "Read & write files in workspace sandbox" },
                    { key: "code_execution", label: "Code Execution",  desc: "Run shell commands & scripts" },
                    { key: "knowledge_base", label: "Knowledge Base",  desc: "Query beliefs, submit observations" },
                    { key: "research",       label: "Research",        desc: "Deep research & planning" },
                    { key: "reasoning",      label: "Reasoning",       desc: "Epistemic & dialectic analysis" },
                    { key: "system_control", label: "System Control",  desc: "Browser control; +File System = project-wide file access" },
                    { key: "communication",  label: "Communication",   desc: "Delegate tasks to peer QE agents" },
                    { key: "mcp_tools",      label: "MCP Tools",       desc: "External MCP server tools" },
                  ];
                  const hasSandboxEscape = !!agentPermissions.file_system && !!agentPermissions.system_control;
                  const activeCount = Object.values(agentPermissions).filter(Boolean).length;
                  const PRESETS = {
                    restricted: { web_access: true, file_system: false, code_execution: false, knowledge_base: true, research: false, reasoning: false, system_control: false, communication: false, mcp_tools: false },
                    standard: { web_access: true, file_system: true, code_execution: false, knowledge_base: true, research: true, reasoning: true, system_control: false, communication: false, mcp_tools: true },
                    autonomous: { web_access: true, file_system: true, code_execution: true, knowledge_base: true, research: true, reasoning: true, system_control: true, communication: true, mcp_tools: true },
                  };
                  const currentPreset = Object.entries(PRESETS).find(([, v]) => JSON.stringify(v) === JSON.stringify(agentPermissions))?.[0] || null;
                  const sendPerms = (scopes) => {
                    setAgentPermissions(scopes);
                    localStorage.setItem("qe_agent_permissions", JSON.stringify(scopes));
                    Object.values(chatWsRefs.current).forEach(ws => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "set_permissions", scopes })); });
                  };
                  const toggleScope = (key) => { sendPerms({ ...agentPermissions, [key]: !agentPermissions[key] }); };
                  const applyPreset = (name) => { sendPerms({ ...PRESETS[name] }); };
                  return (
                    <div style={{ flexShrink: 0, marginBottom: 12, border: `1px solid ${palette.border}`, borderRadius: 8, background: palette.surface, overflow: "hidden" }}>
                      <div onClick={() => setPermissionsExpanded(!permissionsExpanded)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 14px", cursor: "pointer", userSelect: "none" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <span style={{ fontSize: 14 }}>&#x1f6e1;</span>
                          <span style={{ fontFamily: FONT_MONO, fontSize: 12, fontWeight: 600, color: palette.text }}>Agent Permissions</span>
                          <span style={{ fontFamily: FONT_MONO, fontSize: 11, color: palette.textDim }}>{activeCount}/9 scopes active</span>
                          {currentPreset && <Badge color={currentPreset === "restricted" ? palette.green : currentPreset === "standard" ? palette.blue : palette.red}>{currentPreset}</Badge>}
                        </div>

              const categories = isGrouped ? Object.keys(flags) : [];

              <div>
                <SectionHeader title="Feature Flags" subtitle={`${enabledCount} enabled / ${allFlags.length} total`} actions={

                  <div>
                    {/* Grouped by category */}
                    {isGrouped ? categories.map(cat => (
                      <div key={cat} style={{ marginBottom: 20 }}>
                        <div style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8, fontWeight: 600 }}>{cat}</div>

                          {(flags[cat] || []).map(flag => (
                            <div key={flag.name} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 18px", background: palette.surface, borderRadius: 8, border: `1px solid ${flag.enabled ? palette.green + "30" : palette.border}` }}>

                                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                  <span style={{ fontSize: 13, fontWeight: 500, color: flag.enabled ? palette.textBright : palette.textDim }}>{flag.name}</span>
                                  {flag.risk && flag.risk !== "low" && <Badge color={riskColors[flag.risk] || palette.textDim}>{flag.risk}</Badge>}

                                  {flag.recommended && <Badge color={palette.green}>recommended</Badge>}
                                </div>
                                {flag.description && <div style={{ fontSize: 11, fontFamily: FONT_MONO, color: palette.textDim, marginTop: 2 }}>{flag.description}</div>}

                              </div>
                              <StatusPill status={flag.enabled ? "enabled" : "disabled"} />
                            </div>
                          ))}
                        </div>

                  <div>

                        <Stat label="Active Guards" value={(guardrailsStatus.guards || []).filter(g => g.enabled).length} color={palette.green} />

                      </div>
                      <div style={{ background: palette.surface, border: `1px solid ${palette.border}`, borderRadius: 8, padding: 20 }}>
                        <Stat label="Rules" value={(guardrailsStatus.rules || []).length} color={palette.yellow} />
                      </div>

                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
